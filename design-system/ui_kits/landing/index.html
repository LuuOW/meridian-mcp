<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Meridian — Calibrated task routing</title>
<link rel="icon" type="image/svg+xml" href="../../assets/logo-meridian.svg">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<style>
/* === TOKENS (inlined from colors_and_type.css) === */
/* ──────────────────────────────────────────────────────────────────────────
   MERIDIAN — Colors & Type tokens
   Lifted directly from landing/style.css + miniapp/miniapp.css in the
   LuuOW/meridian-mcp monorepo. Dark-mode first; no light variant.
   ────────────────────────────────────────────────────────────────────────── */

:root {
  /* ── BACKGROUNDS ───────────────────────────────────────────────── */
  --bg:               #0a0d14;   /* deep space — the canonical page bg */
  --bg-deep:          #06080f;   /* darker for inset surfaces */
  --bg-card:          rgba(18, 23, 36, 0.7);   /* translucent card on the radial-gradient body */
  --bg-code:          #0f1220;   /* code blocks + textareas */

  /* The page wash itself — three stacked radial-gradients over a flat
     vertical fade. Use as `background: var(--bg-page);` on body. */
  --bg-page:
    radial-gradient(1400px 700px at 80% -10%, #1c1845 0%, transparent 60%),
    radial-gradient(900px 500px at 10% 30%, #0e2233 0%, transparent 60%),
    linear-gradient(180deg, #0a0d14, #06080f);

  /* ── TEXT ──────────────────────────────────────────────────────── */
  --text:             #e6ecf5;   /* primary */
  --text-muted:       #8a94a6;   /* secondary body, lead, captions */
  --text-faint:       #5d6778;   /* tertiary — eyebrow labels, footnote */

  /* ── BORDERS ───────────────────────────────────────────────────── */
  --border:           rgba(148, 163, 184, 0.14);
  --border-2:         rgba(148, 163, 184, 0.22);
  --border-violet:    rgba(167, 139, 250, 0.35);

  /* ── BRAND ACCENTS ─────────────────────────────────────────────── */
  --accent:           #a78bfa;   /* neon-violet — the brand primary */
  --accent-d:         #8b5cf6;   /* violet-deep — gradient endpoint */
  --accent-2:         #10b981;   /* mint — "live" status, success */
  --astro:            #38bdf8;   /* sky — secondary accent, links */
  --pink:             #f472b6;   /* hot-pink — comet class, decorative */

  /* ── NEON PALETTE (the four anchors of every glow + gradient) ─── */
  --neon-violet:      #a78bfa;
  --neon-cyan:        #38bdf8;
  --neon-mint:        #10b981;
  --neon-pink:        #f472b6;
  --glow-violet:      rgba(167, 139, 250, 0.55);
  --glow-cyan:        rgba(56, 189, 248, 0.45);

  /* ── CELESTIAL CLASS COLORS ────────────────────────────────────── */
  --class-planet:     #7dd3fc;   /* sky-300  — stable, glowing core */
  --class-moon:       #cbd5e1;   /* slate-300 — quiet satellite */
  --class-trojan:     #c4b5fd;   /* violet-300 — companions */
  --class-asteroid:   #fcd34d;   /* amber-300 — small + bright */
  --class-comet:      #f9a8d4;   /* pink-300 — dynamic, tail */
  --class-irregular:  #d8b4fe;   /* purple-300 — oddball */

  /* ── STAR-SYSTEM TINTS ─────────────────────────────────────────── */
  --system-forge:     #f97316;   /* orange — execution / build */
  --system-signal:    #38bdf8;   /* cyan — telemetry / observe */
  --system-mind:      #a78bfa;   /* violet — reason / model */

  /* ── GRADIENTS ─────────────────────────────────────────────────── */
  --grad-hero:        linear-gradient(90deg, #a78bfa, #38bdf8 60%, #10b981);
  --grad-btn:         linear-gradient(180deg, #a78bfa, #8b5cf6);
  --grad-price:       linear-gradient(180deg, #ddd6fe, #a78bfa 70%, #8b5cf6);

  /* ── SPACING (4 px base) ──────────────────────────────────────── */
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-7:  48px;
  --s-8:  64px;
  --s-9:  96px;
  --s-10: 128px;
  --section-y: clamp(48px, 8vw, 96px);

  /* ── RADII ─────────────────────────────────────────────────────── */
  --r-1:    6px;
  --r-2:   10px;
  --r-3:   14px;
  --r-pill: 999px;

  /* ── ELEVATION / GLOWS ─────────────────────────────────────────── */
  --shadow-card:      0 0 18px rgba(167, 139, 250, 0.06);
  --shadow-card-hover: 0 0 0 1px rgba(167, 139, 250, 0.35),
                       0 0 28px rgba(167, 139, 250, 0.20);
  --shadow-btn:       0 0 0 1px rgba(167, 139, 250, 0.45),
                      0 0 14px 2px rgba(167, 139, 250, 0.35),
                      0 0 28px 6px rgba(167, 139, 250, 0.18);
  --shadow-panel:     -8px 0 40px rgba(0, 0, 0, 0.5),
                      -1px 0 24px rgba(167, 139, 250, 0.18);

  /* ── MOTION ────────────────────────────────────────────────────── */
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast:    0.15s;
  --dur-base:    0.25s;
  --dur-slow:    0.5s;

  /* ── TYPOGRAPHY ────────────────────────────────────────────────── */
  --font-body: 'Inter', -apple-system, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* Type scale — display down to caption. Headings are tight-tracked
     and balanced; body is slack at 1.65 line-height. */
  --fs-display:   clamp(36px, 6vw, 60px);
  --fs-h1:        clamp(28px, 5vw, 40px);
  --fs-h2:        clamp(22px, 3.5vw, 32px);
  --fs-h3:        17px;
  --fs-lead:      17px;
  --fs-body:      15px;
  --fs-small:     13.5px;
  --fs-caption:   12px;
  --fs-eyebrow:   11.5px;   /* mono, all-caps, 0.18em tracking */
  --fs-code:      13.5px;

  --lh-tight:     1.05;
  --lh-snug:      1.15;
  --lh-base:      1.65;
  --lh-mono:      1.7;

  --tracking-tight:   -0.025em;
  --tracking-tight-2: -0.02em;
  --tracking-eyebrow: 0.18em;
  --tracking-section: 0.12em;
}

/* ──────────────────────────────────────────────────────────────────────────
   SEMANTIC TYPE — apply these classes anywhere in the system.
   ────────────────────────────────────────────────────────────────────────── */
.t-display {
  font-family: var(--font-body);
  font-size: var(--fs-display);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  font-weight: 700;
  text-wrap: balance;
}
.t-h1 {
  font-family: var(--font-body);
  font-size: var(--fs-h1);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-tight-2);
  font-weight: 700;
  text-wrap: balance;
}
.t-h2 {
  font-family: var(--font-body);
  font-size: var(--fs-h2);
  line-height: 1.2;
  letter-spacing: var(--tracking-tight-2);
  font-weight: 700;
  text-wrap: balance;
}
.t-h3 {
  font-family: var(--font-body);
  font-size: var(--fs-h3);
  line-height: 1.3;
  letter-spacing: -0.01em;
  font-weight: 600;
}
.t-lead {
  font-family: var(--font-body);
  font-size: var(--fs-lead);
  line-height: var(--lh-base);
  color: var(--text-muted);
  text-wrap: pretty;
}
.t-body {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-base);
  color: var(--text);
}
.t-small {
  font-family: var(--font-body);
  font-size: var(--fs-small);
  line-height: 1.55;
  color: var(--text-muted);
}
.t-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-code);
  line-height: var(--lh-mono);
  color: #a5b4fc;
}
.t-eyebrow {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  letter-spacing: var(--tracking-eyebrow);
  text-transform: uppercase;
  font-weight: 600;
  color: var(--accent);
}

/* The signature gradient text — used on hero phrase + price values. */
.t-grad {
  background: var(--grad-hero);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ──────────────────────────────────────────────────────────────────────────
   FONTS — Meridian uses the system Inter + JetBrains Mono stacks. Both are
   loaded from Google Fonts because the codebase only declares them by name
   in `font-family` (no /fonts/*.ttf shipped). If you need offline fidelity,
   self-host these two families and they'll drop straight in.
   ────────────────────────────────────────────────────────────────────────── */



/* Meridian landing — condensed from landing/style.css. Tokens come from
   ../../colors_and_type.css. */

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg-page);
  min-height: 100vh; color: var(--text);
  font-family: var(--font-body); font-size: 15px; line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
code, pre { font-family: var(--font-mono); }
code {
  background: rgba(148,163,184,0.12); padding: 2px 6px; border-radius: 4px;
  font-size: 0.92em; color: #ddd6fe;
}

@property --neon-angle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
@keyframes neonRotate { to { --neon-angle: 360deg; } }
@keyframes gradShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

/* ── NAV ─────────────────────────────────────────────────────────────── */
.nav {
  display: flex; justify-content: space-between; align-items: center; gap: 18px;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; backdrop-filter: blur(12px);
  background: rgba(10,13,20,0.85); z-index: 10;
}
.brand { font-weight: 700; font-size: 17px; color: var(--accent); }
.nav-inline { list-style: none; padding: 0; margin: 0; display: flex; gap: 8px; }
.nav-inline-link {
  background: transparent; border: none; color: var(--text-muted);
  font-family: inherit; font-size: 14px; padding: 6px 10px; cursor: pointer;
  border-radius: 8px; transition: color 0.15s, background 0.15s;
}
.nav-inline-link:hover { color: var(--text); background: rgba(167,139,250,0.06); }
.nav-inline-link .caret { font-size: 10px; margin-left: 4px; color: var(--text-faint); }
.cmdk-trigger {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 10px 6px 12px; border-radius: 8px;
  border: 1px solid var(--border-2); background: rgba(15,18,32,0.6);
  color: var(--text-muted); font-family: inherit; font-size: 13px; cursor: pointer;
}
.cmdk-trigger:hover { border-color: var(--accent); color: var(--text); }
.cmdk-kbd {
  font-family: var(--font-mono); font-size: 11px; background: rgba(148,163,184,0.12);
  padding: 1px 6px; border-radius: 4px; color: var(--text-muted);
}
.nav-gh-link { color: var(--text-muted); display: inline-flex; align-items: center; }
.nav-gh-link:hover { color: var(--text); }
.burger {
  position: relative; display: inline-flex; width: 36px; height: 36px;
  background: rgba(167,139,250,0.06);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 10px; cursor: pointer; padding: 0;
}
.burger span { position: absolute; left: 9px; right: 9px; height: 2px; background: var(--text); border-radius: 1px; }
.burger span:nth-child(1) { top: 12px; }
.burger span:nth-child(2) { top: 17px; }
.burger span:nth-child(3) { top: 22px; }
@media (max-width: 900px) {
  .nav-inline, .cmdk-trigger { display: none; }
  .nav { padding: 12px 16px; }
}

.hero-wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

/* ── HERO ────────────────────────────────────────────────────────────── */
.hero {
  position: relative; isolation: isolate;
  padding: 96px 0 72px;
  text-align: center;
}
.hero::before {
  content: '';
  position: absolute; inset: -10% -10% -10% -10%; z-index: -1;
  background: radial-gradient(400px 300px at var(--cursor-x, 50%) var(--cursor-y, 35%),
    rgba(167,139,250,0.18), rgba(56,189,248,0.08) 35%, transparent 70%);
  pointer-events: none;
  transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.hero-orbits {
  position: absolute; top: 50%; left: 50%;
  width: min(960px, 110vw); aspect-ratio: 1;
  translate: -50% -50%; pointer-events: none; z-index: -2;
  opacity: 0.55; filter: blur(0.3px);
  mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
}
.eyebrow {
  display: inline-block; position: relative;
  font-family: var(--font-mono); font-size: 11.5px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent); padding: 5px 14px;
  border: 1px solid var(--border-2); border-radius: 999px;
  margin-bottom: 22px;
  background: rgba(167,139,250,0.05);
  box-shadow: 0 0 18px rgba(167,139,250,0.18);
  white-space: nowrap;
}
.eyebrow-live {
  color: #10b981 !important;
  border-color: rgba(16,185,129,0.45) !important;
  padding-left: 30px !important;
  box-shadow: 0 0 22px rgba(16,185,129,0.22);
}
.eyebrow-live::after {
  content: ''; position: absolute; left: 12px; top: 50%;
  width: 8px; height: 8px; margin-top: -4px;
  border-radius: 50%; background: #10b981;
  animation: liveDotPing 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
@keyframes liveDotPing {
  0%   { box-shadow: 0 0 0 0  rgba(16,185,129,0.65); transform: scale(0.92); }
  60%  { box-shadow: 0 0 0 10px rgba(16,185,129,0); transform: scale(1.05); }
  100% { box-shadow: 0 0 0 0  rgba(16,185,129,0); transform: scale(0.92); }
}
.hero-title {
  font-size: clamp(36px, 6vw, 60px); line-height: 1.05;
  letter-spacing: -0.025em; margin: 0 0 18px;
  font-weight: 700; text-wrap: balance;
}
.grad {
  background: linear-gradient(90deg, #a78bfa, #38bdf8 60%, #10b981);
  background-size: 200% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradShift 8s ease-in-out infinite;
}
.lead {
  font-size: 17px; color: var(--text-muted);
  max-width: 640px; margin: 0 auto 32px; line-height: 1.65; text-wrap: pretty;
}
.cta-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 36px; }

/* ── BUTTONS ─────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 11px 22px; border-radius: 10px;
  font-size: 14.5px; font-weight: 600; transition: all 0.15s;
  border: 1px solid transparent; cursor: pointer; font-family: inherit;
}
.btn-block { display: flex; text-align: center; margin-top: 18px; width: 100%; }
.btn-primary {
  position: relative;
  background: linear-gradient(180deg, #a78bfa, #8b5cf6);
  color: #0a0d14;
  border-radius: 12px;
  isolation: isolate;
  box-shadow:
    0 0 0 1px rgba(167,139,250,0.45),
    0 0 18px rgba(167,139,250,0.30),
    inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-primary::before {
  content: ''; position: absolute; inset: -2px; border-radius: inherit;
  background: conic-gradient(from var(--neon-angle), #a78bfa, #38bdf8, #10b981, #f472b6, #a78bfa);
  opacity: 0.35; filter: blur(8px); z-index: -1;
  animation: neonRotate 6s linear infinite;
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-ghost {
  background: transparent; color: var(--text);
  border-color: var(--border-2);
  position: relative; isolation: isolate;
}
.btn-ghost::before {
  content: ''; position: absolute; inset: -1px; border-radius: inherit;
  background: conic-gradient(from 0deg, rgba(167,139,250,0.6), rgba(56,189,248,0.5), rgba(167,139,250,0.6));
  opacity: 0; filter: blur(8px); z-index: -1; transition: opacity 0.3s;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
.btn-ghost:hover::before { opacity: 0.45; }

/* ── FLEET ───────────────────────────────────────────────────────────── */
.products { padding: clamp(48px, 8vw, 96px) 0; text-align: center; }
.fleet-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 18px; text-align: left;
}
@media (max-width: 1000px) { .fleet-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px)  { .fleet-grid { grid-template-columns: 1fr; } }
.product-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid rgba(167,139,250,0.25);
  border-radius: 14px;
  padding: 22px 22px;
  display: flex; flex-direction: column;
  transition: transform 0.25s var(--ease-out, cubic-bezier(0.16,1,0.3,1)), border-color 0.25s;
  box-shadow: 0 0 18px rgba(167,139,250,0.06);
  overflow: hidden; isolation: isolate;
}
.product-card::before {
  content: ''; position: absolute; inset: 0;
  background-image: var(--card-bg-image);
  background-size: cover; background-position: center;
  opacity: 0.5; z-index: -1; transition: opacity 0.25s ease;
}
.product-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(15,17,22,0.45) 0%, rgba(15,17,22,0.80) 60%, rgba(15,17,22,0.95) 100%);
  z-index: -1; pointer-events: none;
}
.product-card:hover {
  transform: translateY(-2px);
  border-color: rgba(167,139,250,0.6);
  box-shadow: 0 8px 32px rgba(167,139,250,0.18);
}
.product-card:hover::before { opacity: 0.7; }
.product-emoji { font-size: 26px; margin-bottom: 6px; line-height: 1; }
.product-card h3 {
  margin: 0 0 6px;
  font-size: 15px; letter-spacing: -0.01em;
  font-family: var(--font-mono); color: var(--text);
}
.product-tagline { font-size: 13px; color: var(--text-muted); margin: 0; line-height: 1.55; }
.product-tagline strong { color: var(--text); }

/* ── STATS ───────────────────────────────────────────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 48px 0;
  padding: 24px 12px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(167,139,250,0.04), transparent 60%);
}
.stat { text-align: center; padding: 12px 8px; border-right: 1px dashed var(--border); }
.stat:last-child { border-right: none; }
.stat-num {
  font-family: var(--font-mono); font-size: clamp(28px, 4vw, 40px);
  font-weight: 700; letter-spacing: -0.02em;
  background: linear-gradient(180deg, #ddd6fe, var(--accent) 70%, var(--accent-d));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1.05;
}
.stat-unit { font-size: 0.55em; color: var(--accent); -webkit-text-fill-color: var(--accent); margin-left: 1px; }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 8px; text-wrap: balance; line-height: 1.45; }
@media (max-width: 760px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .stat:nth-child(2n) { border-right: none; }
  .stat:nth-child(-n+2) { border-bottom: 1px dashed var(--border); padding-bottom: 16px; }
}

/* ── FEATURES ────────────────────────────────────────────────────────── */
.features {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 18px; margin: 24px 0 72px;
}
@media (max-width: 820px) { .features { grid-template-columns: 1fr; } }
.feature, .step {
  position: relative; isolation: isolate;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  backdrop-filter: blur(8px);
  transition: transform 0.2s, border-color 0.25s, box-shadow 0.25s, background 0.25s;
  box-shadow: 0 0 18px rgba(167,139,250,0.05);
}
.feature::before, .step::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: inherit;
  background: conic-gradient(from var(--neon-angle),
    rgba(167,139,250,0.55), rgba(56,189,248,0.45), rgba(16,185,129,0.45),
    rgba(244,114,182,0.45), rgba(167,139,250,0.55));
  opacity: 0.18; filter: blur(10px); z-index: -1;
  animation: neonRotate 14s linear infinite;
}
.feature:hover, .step:hover {
  transform: translateY(-2px);
  border-color: rgba(167,139,250,0.55);
  background: rgba(20, 24, 38, 0.78);
  box-shadow: 0 0 0 1px rgba(167,139,250,0.35), 0 0 28px rgba(167,139,250,0.20);
}
.feature:hover::before, .step:hover::before { opacity: 0.55; animation-duration: 6s; }
.feature-icon {
  font-size: 28px; color: var(--accent);
  text-shadow: 0 0 12px rgba(167,139,250,0.6), 0 0 22px rgba(167,139,250,0.3);
  margin-bottom: 12px; line-height: 1; display: inline-block;
}
.feature h3 { margin: 0 0 8px; font-size: 17px; letter-spacing: -0.01em; }
.feature p { margin: 0; color: var(--text-muted); font-size: 14px; }

/* ── HOW ─────────────────────────────────────────────────────────────── */
.how { padding: 48px 0 72px; }
.how h2, .pricing h2, .cta-final h2 {
  position: relative; display: inline-block;
  font-size: 28px; letter-spacing: -0.02em;

function Hero() {
  const heroRef = React.useRef(null);
  React.useEffect(() => {
    const el = heroRef.current;
    if (!el) return;
    let raf = 0, x = 50, y = 35;
    function onMove(e) {
      const r = el.getBoundingClientRect();
      x = ((e.clientX - r.left) / r.width) * 100;
      y = ((e.clientY - r.top) / r.height) * 100;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        el.style.setProperty('--cursor-x', `${x}%`);
        el.style.setProperty('--cursor-y', `${y}%`);
      });
    }
    el.addEventListener('mousemove', onMove);
    return () => el.removeEventListener('mousemove', onMove);
  }, []);

  return (
    <section className="hero" ref={heroRef}>
      <HeroOrbits />
      <span className="eyebrow eyebrow-live">MCP server · v3.2.0</span>
      <h1 className="hero-title">

function App() {
  const { LandingNav, LandingHero, FleetGrid, StatsStrip, FeaturesGrid, HowItWorks, PricingGrid, CtaFinal, LandingFooter } = window;
  return (
    <>
      <LandingNav />
      <main id="main" className="hero-wrap">
        <LandingHero />
        <FleetGrid />
        <StatsStrip />
        <FeaturesGrid />
        <HowItWorks />
        <PricingGrid />
        <CtaFinal />
      </main>
      <LandingFooter />
    </>
  );
}
function tryRender() {
  const needed = ['LandingNav','LandingHero','FleetGrid','StatsStrip','FeaturesGrid','HowItWorks','PricingGrid','CtaFinal','LandingFooter'];
  if (needed.every(k => window[k])) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  } else {
    setTimeout(tryRender, 30);
  }
}
tryRender();
</script>

</body>
</html>
