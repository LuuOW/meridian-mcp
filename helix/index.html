<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0a0d14">
<title>helix — Meridian</title>
<meta name="description" content="Vision/text → top therapeutic protein candidates rendered as real molecular structures. Powered by Llama-3.3-70B + GPT-4o-mini.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/helix/helix.css?v=__BUILD_SHA__">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/molstar@4.7.0/build/viewer/molstar.css">
</head>
<body>

<nav class="topbar">
  <a class="brand" href="/"><span class="brand-glyph">◎</span> meridian</a>
  <div class="brand-sub">helix · therapeutic protein recommender</div>
  <button id="burgerBtn" class="burger" aria-label="Open menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div id="navMenu" class="nav-menu">
    <a href="/">home</a>
    <a href="/lens/">lens</a>
    <a href="/miniapp/">miniapp</a>
    <a href="/miniapp/vision-lab/">vision-lab</a>
    <a href="https://github.com/LuuOW/meridian-mcp" target="_blank" rel="noopener">source</a>
  </div>
</nav>

<main class="stage">
  <!-- Central protein + orbiting molecule moons -->
  <div class="protein-system">
    <div class="orbits" id="orbits" aria-hidden="true">
      <!-- moon nodes appended at runtime -->
    </div>
    <div id="molstar" class="molstar-host empty" aria-label="Top candidate 3D structure">
      <span class="center-hint">describe an injury — top candidate's structure renders here</span>
    </div>
  </div>

  <section id="inputCard" class="input-card glass">
    <div class="input-row">
      <textarea id="desc" placeholder="Describe the injury — e.g. corneal abrasion, lower right quadrant, sharp pain on blink, photophobia. Cmd/Ctrl+Enter to send."></textarea>
    </div>
    <div class="input-row controls">
      <label class="btn ghost icon-btn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h3l2-3h8l2 3h3v13H3z"/><circle cx="12" cy="13" r="4"/></svg>
        <input id="img-input" type="file" accept="image/*" capture="environment" hidden>
        photo
      </label>
      <img id="img-preview" alt="" />
      <span id="status" class="status">idle</span>
      <button id="run" class="btn primary">recommend ↵</button>
    </div>
  </section>

  <aside id="detailPanel" class="detail glass" hidden>
    <button class="detail-close" aria-label="Close">×</button>
    <h2 id="detailTitle"></h2>
    <div id="detailMeta" class="detail-meta"></div>
    <p id="detailRationale" class="detail-rationale"></p>
    <div id="detailScores" class="detail-scores"></div>
    <div id="detailNotes" class="detail-notes"></div>
  </aside>

  <details class="debug glass">
    <summary>debug / raw JSON</summary>
    <pre id="debug">(empty)</pre>
  </details>
</main>

<script type="module" src="/helix/app.mjs?v=__BUILD_SHA__"></script>
</body>
</html>
