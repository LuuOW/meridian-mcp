name: helio-mirror-status

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: helio-mirror/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r helio-mirror/requirements.txt

      - name: Dataset health summary
        working-directory: helio-mirror
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python status.py
