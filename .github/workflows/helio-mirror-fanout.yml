name: helio-mirror-fanout

# Fan-out the full pipeline across all five perihelia. With max-parallel=1
# they run sequentially to stay under HF's 128 commits/hour limit. Use this
# when you've patched a stage and want every perihelion regenerated.
# Wall clock: ~15 min × 5 + 3 min training = ~78 min.

on:
  workflow_dispatch:
    inputs:
      skip_pull:
        description: "Skip stage 1 (pull) — useful when raw data is already on HF"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  perihelion:
    strategy:
      fail-fast: false
      max-parallel: 1   # HF Hub commit API rate-limits parallel uploads to the same dataset (429)
      matrix:
        perihelion: [E20, E21, E22, E23, E24]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HELIO_PERIHELION: ${{ matrix.perihelion }}
    steps:
      # Pin to the dispatch-time SHA so all five matrix jobs run identical
      # code — without this, a push during fanout makes queued jobs drift
      # to whatever's on main when they actually start.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: helio-mirror/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r helio-mirror/requirements.txt

      - name: Stage 1 — pull
        if: ${{ !inputs.skip_pull }}
        working-directory: helio-mirror
        run: python pull.py

      - name: Stage 2 — register
        working-directory: helio-mirror
        run: python register.py

      - name: Stage 3 — detect (PVI + JWST aggregates)
        working-directory: helio-mirror
        run: python detect.py

      - name: Stage 3b — detect_wispr (CME brightness fronts)
        working-directory: helio-mirror
        continue-on-error: true
        run: python detect_wispr.py

      - name: Stage 3c — detect_sep (SEP onsets)
        working-directory: helio-mirror
        continue-on-error: true
        run: python detect_sep.py

      - name: Stage 4 — coincide
        working-directory: helio-mirror
        run: python coincide.py

      - name: Stage 4-tight — physics-aware tolerances
        working-directory: helio-mirror
        continue-on-error: true
        run: python coincide_tight.py

      - name: Stage 5 — calibrate
        working-directory: helio-mirror
        run: python calibrate.py

      - name: Stage 6 — forecast
        working-directory: helio-mirror
        run: python forecast.py

  # Post-matrix: once all five perihelia have delivered_*.parquet on HF, train
  # the per-body ML residual once. ml_residual pools across all perihelia, so
  # running it inside the matrix would either retrain N times (waste) or
  # see partial data on early iterations (misleading). Running once at the
  # end gives a clean snapshot.
  ml-residual:
    needs: perihelion
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: helio-mirror/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r helio-mirror/requirements.txt

      - name: Train ML residual across all delivered perihelia
        working-directory: helio-mirror
        continue-on-error: true   # may stay gated (insufficient pairs) — not a fanout failure
        run: python ml_residual.py

      - name: Null tests across all perihelia
        working-directory: helio-mirror
        continue-on-error: true
        env:
          HELIO_NULL_SHUFFLES: "100"
        run: |
          for P in E20 E21 E22 E23 E24; do
            echo "=== null_test loose $P ==="
            HELIO_PERIHELION=$P HELIO_NULL_MODE=loose python null_test.py || true
          done

      - name: Refresh dataset_status.json
        working-directory: helio-mirror
        continue-on-error: true
        run: python status.py

      - name: Generate findings markdown
        working-directory: helio-mirror
        continue-on-error: true
        run: python findings.py
