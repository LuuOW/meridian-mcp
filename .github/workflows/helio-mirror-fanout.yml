name: helio-mirror-fanout

# Fan-out the full pipeline across all five perihelia. Each runs as an
# independent job in parallel so a failure in one doesn't poison the others.
# Use this when you've patched a stage and want every perihelion in the
# cache regenerated end-to-end. ~15 min × 5 = 75 min wall clock, ~15 min
# of CI budget per job (parallel) on free tier.

on:
  workflow_dispatch:
    inputs:
      skip_pull:
        description: "Skip stage 1 (pull) — useful when raw data is already on HF"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  perihelion:
    strategy:
      fail-fast: false
      max-parallel: 1   # HF Hub commit API rate-limits parallel uploads to the same dataset (429)
      matrix:
        perihelion: [E20, E21, E22, E23, E24]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HELIO_PERIHELION: ${{ matrix.perihelion }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: helio-mirror/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r helio-mirror/requirements.txt

      - name: Stage 1 — pull
        if: ${{ !inputs.skip_pull }}
        working-directory: helio-mirror
        run: python pull.py

      - name: Stage 2 — register
        working-directory: helio-mirror
        run: python register.py

      - name: Stage 3 — detect
        working-directory: helio-mirror
        run: python detect.py

      - name: Stage 4 — coincide
        working-directory: helio-mirror
        run: python coincide.py

      - name: Stage 5 — calibrate
        working-directory: helio-mirror
        run: python calibrate.py

      - name: Stage 6 — forecast
        working-directory: helio-mirror
        run: python forecast.py
