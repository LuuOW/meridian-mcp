name: helio-mirror-null-test

# Statistical significance test for probe-pair coincidences.
# Shuffles event timestamps within each spacecraft N times and recomputes
# matched coincidences. Compares the observed count to the null
# distribution → empirical p-value + z-score.
#
# Useful for answering "are the 979 matched coincidences real or just
# what you'd expect from this many events at this tolerance?"

on:
  workflow_dispatch:
    inputs:
      perihelion:
        description: "Perihelion window"
        required: true
        default: "E20"
        type: choice
        options: [E20, E21, E22, E23, E24]
      n_shuffles:
        description: "Number of null shuffles (100 ≈ 5 min, 500 ≈ 25 min)"
        required: false
        default: "100"
        type: string
      mode:
        description: "Tolerance mode: loose (constant ±20°/±24h) or tight (per-pair physics-aware)"
        required: false
        default: "loose"
        type: choice
        options: [loose, tight]

permissions:
  contents: read

jobs:
  null-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HELIO_PERIHELION: ${{ inputs.perihelion }}
      HELIO_NULL_SHUFFLES: ${{ inputs.n_shuffles }}
      HELIO_NULL_MODE: ${{ inputs.mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: helio-mirror/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r helio-mirror/requirements.txt

      - name: Run null coincidence test
        working-directory: helio-mirror
        run: python null_test.py
