name: helio-mirror-audit

# Storage audit: walk the HF dataset, sum bytes by folder, flag
# redundancy (raw vs derived). Cheap (<1 min). Useful to know
# where the megabytes go before adding more raw data ingestion.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: helio-mirror/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub pandas

      - name: Run storage audit
        working-directory: helio-mirror
        run: python audit_storage.py
