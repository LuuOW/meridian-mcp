name: stellar-parker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: stellar/requirements-parker.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stellar/requirements-parker.txt

      - name: Compute Earth-PSP Parker connection
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python stellar/parker_connection.py
