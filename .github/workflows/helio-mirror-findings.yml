name: helio-mirror-findings

# Generates a portfolio-friendly markdown summary across all perihelia.
# Run manually after fanout to refresh the canonical FINDINGS.md file.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  findings:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: helio-mirror/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r helio-mirror/requirements.txt

      - name: Generate findings
        working-directory: helio-mirror
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python findings.py
