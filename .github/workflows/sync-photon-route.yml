name: Sync photon-route → HF Space

# Pushes meridian-mcp/photon-route/ directly into the HF Space's own
# git repo at huggingface.co/spaces/luuow/photon-route. HF rebuilds
# the Space on push. Bypasses the standalone GitHub repo entirely.

on:
  push:
    branches: [main]
    paths: ['photon-route/**']
  workflow_dispatch:

jobs:
  push-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Push photon-route/ to HF Space git
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret missing"
            exit 1
          fi
          git config --global user.email "monorepo-sync@meridian-mcp"
          git config --global user.name  "meridian-mcp monorepo sync"

          # Clone the Space's HF-side git (separate from any GitHub repo)
          git clone "https://luuow:${HF_TOKEN}@huggingface.co/spaces/luuow/photon-route" /tmp/hf-space

          # Replace tracked files with the monorepo subdir contents. Leave
          # the .git directory and anything HF added itself alone.
          rsync -a --exclude='.git' --delete-after \
            --exclude='README.md.bak' \
            ./photon-route/ /tmp/hf-space/

          cd /tmp/hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi
          git commit -m "Sync from meridian-mcp@${{ github.sha }}"
          git push
