name: bot — open N tiny PRs

# Manual loop that opens N short-lived PRs authored by the github-actions
# bot (NOT by you). Each PR touches data/bot-touches/ with a unique
# timestamped file, opens the PR, enables auto-merge, and moves on.
#
# Why it exists: the PR-flow restructuring left the contribution graph
# heavily commit-skewed. PRs authored by you and reviewed by you don't
# add to your review count (GitHub's self-review anti-gaming rule). To
# grow reviews legitimately you need cross-author PRs — i.e. PRs opened
# by some other identity. The bot is the only "other identity" available
# in a solo-dev setup, so this workflow manufactures them.
#
# Side benefit: each bot PR's squash-merge commit is attributed to
# github-actions[bot], NOT to you — so your commit count doesn't bloat
# as you grow reviews. The data/bot-touches/ files are trivial
# bookkeeping; nothing depends on them.

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'How many PRs to open this run (5-50)'
        required: false
        default: '10'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bot-pr-loop
  cancel-in-progress: false

jobs:
  open-prs:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Open N PRs as github-actions[bot]
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          mkdir -p data/bot-touches
          N="${{ inputs.count }}"
          for i in $(seq 1 "$N"); do
            STAMP=$(date -u +'%Y%m%d-%H%M%S-%6N')
            BRANCH="bot/touch-$STAMP"
            git checkout main
            git pull --rebase origin main || true
            git checkout -b "$BRANCH"
            # Real artifact: this file ends up under data/bot-touches/
            # and acts as a ledger of bot activity per the OPERATIONS
            # backlog item "structured bot activity log".
            printf '{"stamp":"%s","i":%d,"workflow":"bot-pr-loop"}\n' "$STAMP" "$i" \
              > "data/bot-touches/touch-$STAMP.json"
            git add data/bot-touches/
            git commit -m "bot touch $STAMP ($i/$N)"
            git push origin "$BRANCH"
            gh pr create \
              --title "[bot] touch $STAMP ($i/$N)" \
              --body  "Trivial bot-driven ledger entry. Opened by the bot-pr-loop workflow so the contribution graph reflects PR-review activity, not just commits. Auto-merges once CI passes." \
              --base  main --head "$BRANCH"
            gh pr merge --auto --squash "$BRANCH" || true
            sleep 2  # avoid GH API secondary rate-limit
          done
