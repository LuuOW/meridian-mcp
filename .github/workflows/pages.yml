name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'skills/**'
      - 'scripts/build-miniapp-index.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build miniapp skill index
        run: node scripts/build-miniapp-index.mjs

      - name: Assemble Pages tree
        run: |
          mkdir -p dist
          cp -R landing/. dist/
          ls -la dist | head

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
