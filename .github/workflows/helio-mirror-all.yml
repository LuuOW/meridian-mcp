name: helio-mirror-all

# Single-click orchestrator: runs all six stages in sequence for one perihelion.
# Each stage uses the same env (HF_TOKEN, HELIO_PERIHELION) and pip cache. If
# you only need to rerun a single stage, use its dedicated workflow instead.

on:
  workflow_dispatch:
    inputs:
      perihelion:
        description: "Perihelion window (E20–E24)"
        required: true
        default: "E24"
        type: choice
        options: [E20, E21, E22, E23, E24]
      skip_pull:
        description: "Skip stage 1 (pull) — useful when raw data is already on HF"
        required: false
        default: false
        type: boolean
      pvi_threshold:
        description: "PVI > threshold gates the event detector. Default 3 (literature). Raise to 5+ to escape null-saturation."
        required: false
        default: "3.0"
        type: string
  schedule:
    # Mondays 06:00 UTC — refresh forecast/latest.json from the most recent
    # perihelion (defaults to E24 above; change default to widen).
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  full-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HELIO_PERIHELION: ${{ inputs.perihelion }}
      HELIO_PVI_THRESHOLD: ${{ inputs.pvi_threshold }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: helio-mirror/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r helio-mirror/requirements.txt

      - name: Stage 1 — pull
        if: ${{ !inputs.skip_pull }}
        working-directory: helio-mirror
        run: python pull.py

      - name: Stage 2 — register
        working-directory: helio-mirror
        run: python register.py

      - name: Stage 3 — detect (PVI + JWST aggregates)
        working-directory: helio-mirror
        run: python detect.py

      - name: Stage 3b — detect_wispr (CME brightness fronts)
        working-directory: helio-mirror
        continue-on-error: true
        run: python detect_wispr.py

      - name: Stage 3c — detect_sep (SEP onsets)
        working-directory: helio-mirror
        continue-on-error: true
        run: python detect_sep.py

      - name: Stage 4 — coincide
        working-directory: helio-mirror
        run: python coincide.py

      - name: Stage 4-tight — physics-aware tolerances
        working-directory: helio-mirror
        continue-on-error: true
        run: python coincide_tight.py

      - name: Stage 5 — calibrate
        working-directory: helio-mirror
        run: python calibrate.py

      - name: Stage 6 — forecast
        working-directory: helio-mirror
        run: python forecast.py
