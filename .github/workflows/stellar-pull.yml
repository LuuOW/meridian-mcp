name: stellar-pull

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 0"

permissions:
  contents: read

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: stellar/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stellar/requirements.txt

      - name: Run puller
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python stellar/pull.py

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stellar-pull-diagnostics
          path: |
            stellar_cache/
            *.log
          retention-days: 7
          if-no-files-found: ignore
