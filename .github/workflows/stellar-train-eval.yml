name: stellar-train-eval

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  train-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: stellar/requirements-archetypes.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stellar/requirements-archetypes.txt

      - name: Train + evaluate
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python stellar/train_eval.py
