name: Deploy Pages sites

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'landing/**'
      - 'skills/**'
      - 'scripts/build-miniapp-index.mjs'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'site/**'
            landing:
              - 'landing/**'
              - 'skills/**'
              - 'scripts/build-miniapp-index.mjs'

  deploy-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=meridian-docs --branch=main --commit-dirty=true

  deploy-landing:
    needs: changes
    if: needs.changes.outputs.landing == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build miniapp skill index
        run: node scripts/build-miniapp-index.mjs
      # Run wrangler from inside landing/ so it discovers landing/functions/
      # at the project root (not nested). Without this, functions don't
      # bundle and /api/* routes fall through to static asset serving.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: landing
          command: pages deploy . --project-name=meridian-landing --branch=main --commit-dirty=true
