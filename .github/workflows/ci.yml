name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # Node 22 changed `--test <path>` to require() it as a module instead of
      # treating it as a directory glob. Pass test files explicitly so this
      # works on both Node 20 and 22.
      - run: node --test tests/*.test.mjs
        env:
          MERIDIAN_SKILLS_ROOT: ${{ github.workspace }}/skills
          MERIDIAN_SKILL_ORBIT: /dev/null
