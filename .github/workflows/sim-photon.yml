name: Sim — photon-route eval

# Manual-only re-eval of the photon-route corpus. Why manual:
#   * The proper held-out workflow (expand_titles → split_holdout →
#     space.train → eval.run on test only) takes 30+ minutes and
#     burns HF Space CPU time. Auto-scheduling would surprise-burn
#     quota.
#   * Until expand_titles has been run + a fresh weights.npz exists,
#     this workflow just runs the SHA-init eval against the 6-query
#     base relevance set (which is the test-only signal anyway —
#     train was on the 20 title queries).
#
# Use the workflow_dispatch button when you want a fresh snapshot.

on:
  workflow_dispatch:
    inputs:
      relevance:
        description: 'Which relevance file to evaluate against'
        required: false
        default: 'eval/relevance.json'
        type: choice
        options:
          - eval/relevance.json
          - eval/relevance_test.json
          - eval/relevance_expanded.json
      backend:
        description: 'Which encoder backend'
        required: false
        default: 'v2'
        type: choice
        options:
          - v2
          - v1

permissions:
  contents: write

concurrency:
  group: sim-photon
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: photon-route
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install photon-route deps
        run: |
          python -m pip install -U pip
          # Minimal eval deps — skip strawberryfields/thewalrus unless
          # the v1 backend is selected (those take 5+ min to install).
          pip install numpy scipy
          if [ "${{ inputs.backend }}" = "v1" ]; then
            pip install strawberryfields thewalrus
          fi
          pip install -e .

      - name: Run photon eval
        id: sim
        working-directory: .
        run: |
          mkdir -p data/sim-reports
          DATE=$(date -u +'%Y-%m-%d')
          OUT="data/sim-reports/photon-${DATE}-${{ inputs.backend }}.json"
          cd photon-route
          python -m eval.run \
            --backend ${{ inputs.backend }} \
            --relevance ${{ inputs.relevance }} \
            --skip-verify \
            --json > "../$OUT" 2>&1 || true
          cd ..
          cat "$OUT" | head -40
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          NDCG=$(jq -r '.aggregate["ndcg@5"]' "$OUT" 2>/dev/null || echo 'n/a')
          RECALL=$(jq -r '.aggregate["recall@5"]' "$OUT" 2>/dev/null || echo 'n/a')
          {
            echo "ndcg=${NDCG}"
            echo "recall=${RECALL}"
          } >> "$GITHUB_OUTPUT"

      - name: Commit + push report
        working-directory: .
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/sim-reports/
          if git diff --cached --quiet; then
            echo 'no change in sim output; skipping commit'
            exit 0
          fi
          git commit -m "ci(sim-photon): ${{ steps.sim.outputs.date }} ${{ inputs.backend }} eval

          nDCG@5  = ${{ steps.sim.outputs.ndcg }}
          recall@5 = ${{ steps.sim.outputs.recall }}
          relevance = ${{ inputs.relevance }}

          [skip ci]"
          if ! git push origin main; then
            BR="auto/sim-photon-${{ steps.sim.outputs.date }}"
            git checkout -b "$BR"
            git push origin "$BR"
            gh pr create --title "sim-photon ${{ steps.sim.outputs.date }} (${{ inputs.backend }})" \
                         --body  "Manual photon-route eval against \`${{ inputs.relevance }}\`." \
                         --base  main --head "$BR"
            gh pr merge --auto --squash "$BR" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
