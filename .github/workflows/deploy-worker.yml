name: Deploy CF Worker

# Pushes to main that touch the Worker or its shared library deploy
# meridian-mcp to Cloudflare and bind it to https://mcp.ask-meridian.uk.
#
# Required secrets (legacy global-key auth — covers all account ops):
#   CLOUDFLARE_API_KEY     — global API key.
#   CLOUDFLARE_EMAIL       — account email matching the key.
#   CLOUDFLARE_ACCOUNT_ID  — CF account ID.
#
# The pre-existing scoped CLOUDFLARE_API_TOKEN secret didn't have
# Workers Scripts: Edit perms; switching to the global key keeps the
# deploy unblocked. Replace with a scoped token later for least-priv.
#
# The Worker secret MERIDIAN_GITHUB_TOKEN is set out-of-band via
# `wrangler secret put` — secrets are persisted per-Worker and survive
# deploys, so they don't need to be re-uploaded here.

on:
  push:
    branches: [main]
    paths:
      - 'cf-worker/**'
      - 'mcp/_lib/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        run: npx --yes wrangler@4 deploy
        working-directory: cf-worker
        env:
          CLOUDFLARE_API_KEY:    ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL:      ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke-test the live URL
        run: |
          set -e
          # CF Bot Fight Mode blocks default curl UAs from GH-runner
          # IPs with 403 — send a browser-y UA so the verification
          # actually reaches the Worker.
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) deploy-smoke/1.0'
          curl -fsS -A "$UA" https://mcp.ask-meridian.uk/healthz | grep -q '^ok$'
          curl -fsS -A "$UA" https://mcp.ask-meridian.uk/.well-known/oauth-authorization-server \
            | grep -q '"authorization_endpoint":"https://mcp.ask-meridian.uk/authorize"'
          echo "smoke ok"
