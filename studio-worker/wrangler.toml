# Meridian Studio — Cloudflare Worker.
# URL: https://studio.ask-meridian.uk/
# Auth: WebAuthn passkey (single-tenant, USER_ID=lucas).
# Storage: STUDIO_KV (sessions, challenges, registration links, jobs).
# Publishing: GitHub Contents API with a PAT in the GITHUB_TOKEN secret.

name = "meridian-studio"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "studio.ask-meridian.uk", custom_domain = true }
]

[vars]
RP_NAME = "Meridian Studio"
# RP_ID and ORIGIN can be overridden locally via:
#   npx wrangler dev --var "RP_ID:localhost" --var "ORIGIN:http://localhost:8787"
# (the values shown here are for the production deploy)
RP_ID = "studio.ask-meridian.uk"
ORIGIN = "https://studio.ask-meridian.uk"
USER_ID = "lucas"
PUBLIC_ORIGIN = "https://ask-meridian.uk"
GITHUB_REPO = "LuuOW/meridian-mcp"

# Secrets (set via `wrangler secret put`):
#   ADMIN_SECRET         — for /admin/create-registration-link
#   GITHUB_TOKEN         — PAT with contents:write on LuuOW/meridian-mcp only

[[kv_namespaces]]
binding = "STUDIO_KV"
id        = "07e09facfd194ad992a7efec8c3cd6b1"
preview_id = "2b0fb383b0c7428491b2553ac721479a"

[observability]
enabled = true
