<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0a0d14">
<title>Meridian — Checkout canceled</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/style.css">
<style>
  .cancel-wrap { max-width: 540px; margin: 96px auto; padding: 0 24px; text-align: center; }
  .cancel-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 32px;
  }
  .cancel-card h1 { margin: 0 0 10px; font-size: 22px; letter-spacing: -0.02em; }
  .cancel-card p  { color: var(--text-muted); margin: 0 0 18px; }
  .btn {
    display: inline-block; padding: 11px 22px; border-radius: 10px;
    font-size: 14.5px; font-weight: 600;
    background: linear-gradient(180deg, #a78bfa, #8b5cf6); color: #0a0d14;
    text-decoration: none;
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="brand">◎ Meridian</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="https://docs.ask-meridian.uk">Docs</a>
  </div>
</nav>

<main class="cancel-wrap">
  <div class="cancel-card">
    <h1>Checkout canceled</h1>
    <p>No worries — you weren't charged. The free tier still works, and you can come back to upgrade any time.</p>
    <a href="/#pricing" class="btn">← Back to pricing</a>
  </div>
</main>
</body>
</html>
