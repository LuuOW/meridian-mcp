  <button type="button" id="cmdkBtn" class="cmdk-trigger" aria-label="Open search palette">

    <svg aria-hidden="true" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.55v-1.94c-3.2.69-3.87-1.55-3.87-1.55-.52-1.34-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11.06 11.06 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.77.11 3.06.74.81 1.19 1.83 1.19 3.09 0 4.42-2.69 5.4-5.25 5.69.41.36.78 1.05.78 2.12v3.14c0 .31.21.66.79.55C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
  </a>

  <button id="burgerBtn" class="burger" type="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="navMenu">
    <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
  </button>

  <div id="navMenu" class="nav-menu" role="menu">
    <a href="https://ask-meridian.uk/">Home</a>

    <details class="nav-group" open>
      <summary class="nav-section">Apps</summary>
      {{SHOWCASE}}
    </details>

    <details class="nav-group">
      <summary class="nav-section">Resources</summary>
      {{RESOURCES}}
    </details>

    <details class="nav-group">
      <summary class="nav-section">Source</summary>
      {{SOURCE}}
    </details>
  </div>

  <!-- Cmd-K palette: opens on ⌘K / Ctrl-K or clicking the trigger.
       Searches the inlined __CMDK_INDEX__ (apps + docs sections + blog posts).
       Sits at the end of <nav> so sync-nav.py treats it as part of the
       single synced block. -->
  <div id="cmdk" class="cmdk" hidden aria-modal="true" role="dialog" aria-label="Search">
    <div class="cmdk-backdrop" data-cmdk-close></div>
    <div class="cmdk-panel">
      <div class="cmdk-input-row">
        <svg aria-hidden="true" class="cmdk-input-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="cmdkInput" class="cmdk-input" type="search" placeholder="Search apps, docs, blog…" autocomplete="off" spellcheck="false" aria-label="Search">
        <kbd class="cmdk-esc">esc</kbd>
      </div>
      <ul id="cmdkList" class="cmdk-list" role="listbox"></ul>
      <div class="cmdk-footer"><span><kbd>↑</kbd><kbd>↓</kbd> navigate</span><span><kbd>↵</kbd> open</span><span><kbd>esc</kbd> close</span></div>
    </div>
  </div>

  <script>window.__CMDK_INDEX__ = {{CMDK_INDEX}};</script>
  <script>
  /* Self-contained wiring for every nav-bearing surface.
     - desktop Apps dropdown (hover + click)
     - mobile burger / nav-menu
     - cross-host current-link highlight
     - ⌘K palette (search + keyboard nav)
     Single dataset.wired guard so duplicate registrations are a no-op.
     Lives inside <nav> so sync-nav.py captures and propagates it. */
  (function () {
    function setup() {
      var btn  = document.getElementById('burgerBtn')
      var menu = document.getElementById('navMenu')
      if (!btn || !menu) return
      if (btn.dataset.wired) return
      btn.dataset.wired = '1'

      /* ───── mobile burger ───── */
      function toggleMobile(open) {
        var isOpen = open === undefined ? !menu.classList.contains('open') : open
        menu.classList.toggle('open', isOpen)
        btn.classList.toggle('open', isOpen)
        btn.setAttribute('aria-expanded', String(isOpen))
      }
      btn.addEventListener('click', function (e) { e.stopPropagation(); toggleMobile() })
      menu.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () { toggleMobile(false) })
      })

      /* ───── desktop Apps dropdown ───── */
      var appsTrigger = document.querySelector('.nav-apps-trigger')
      var appsMenu    = document.getElementById('appsMenu')
      var appsItem    = document.querySelector('.nav-apps')
      function toggleApps(open) {
        if (!appsItem) return
        var isOpen = open === undefined ? !appsItem.classList.contains('open') : open
        appsItem.classList.toggle('open', isOpen)
        appsTrigger.setAttribute('aria-expanded', String(isOpen))
      }
      if (appsTrigger) {
        appsTrigger.addEventListener('click', function (e) { e.stopPropagation(); toggleApps() })
        appsItem.addEventListener('mouseenter', function () { toggleApps(true) })
        appsItem.addEventListener('mouseleave', function () { toggleApps(false) })
      }

      /* ───── close menus on outside click / Escape ───── */
      document.addEventListener('click', function (e) {
        if (menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)) toggleMobile(false)
        if (appsItem && appsItem.classList.contains('open') && !appsItem.contains(e.target)) toggleApps(false)
      })
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { toggleMobile(false); toggleApps(false); closeCmdk() }
      })

      /* ───── cross-host current-link highlight ───── */
      var here = location.host + location.pathname.replace(/\/index\.html$/, '/')
      document.querySelectorAll('.nav a, #appsMenu a, #navMenu a').forEach(function (a) {
        var href = a.getAttribute('href')
        if (!href) return
        try {
          var u = new URL(href, location.href)
          var target = u.host + u.pathname.replace(/\/index\.html$/, '/')
          if (target === here) a.classList.add('current')
        } catch (_) {}
      })

      /* ───── ⌘K palette ───── */
      var cmdkBtn   = document.getElementById('cmdkBtn')
      var cmdk      = document.getElementById('cmdk')
      var cmdkInput = document.getElementById('cmdkInput')
      var cmdkList  = document.getElementById('cmdkList')
      var idx       = Array.isArray(window.__CMDK_INDEX__) ? window.__CMDK_INDEX__ : []
      var active    = 0

      function openCmdk() {
        if (!cmdk) return
        cmdk.hidden = false
        cmdkInput.value = ''
        active = 0
        render('')
        setTimeout(function () { cmdkInput.focus() }, 10)
      }
      function closeCmdk() { if (cmdk) cmdk.hidden = true }
      function score(item, q) {
        if (!q) return 0
        var hay = (item.label + ' ' + (item.category || '') + ' ' + (item.tag || '')).toLowerCase()
        var qLow = q.toLowerCase()
        if (hay.indexOf(qLow) === -1) return -1
        var pos = hay.indexOf(qLow)
        return 1000 - pos - hay.length * 0.01
      }
      function render(q) {
        if (!cmdkList) return
        var results = idx.map(function (it, i) { return { it: it, s: score(it, q), i: i } })
          .filter(function (r) { return !q || r.s >= 0 })
          .sort(function (a, b) { return b.s - a.s })
          .slice(0, 20)
        cmdkList.innerHTML = results.map(function (r, n) {
          var it = r.it
          return '<li role="option" class="cmdk-item' + (n === active ? ' active' : '') + '" data-href="' + it.href + '">' +
                 '<span class="cmdk-item-emoji">' + (it.emoji || '·') + '</span>' +
                 '<span class="cmdk-item-label">' + escapeHtml(it.label) + '</span>' +
                 '<span class="cmdk-item-cat">' + escapeHtml(it.category || '') + '</span>' +
                 '</li>'
        }).join('')
        if (!results.length) {
          cmdkList.innerHTML = '<li class="cmdk-empty">No matches.</li>'
        }
        cmdkList.querySelectorAll('.cmdk-item').forEach(function (li) {
          li.addEventListener('click', function () { location.href = li.dataset.href })
          li.addEventListener('mouseenter', function () {
            cmdkList.querySelectorAll('.cmdk-item').forEach(function (x, k) { x.classList.toggle('active', x === li) })
            active = Array.from(cmdkList.querySelectorAll('.cmdk-item')).indexOf(li)
          })
        })
      }
      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
        })
      }
      if (cmdkBtn) cmdkBtn.addEventListener('click', openCmdk)
      if (cmdk) {
        cmdk.querySelectorAll('[data-cmdk-close]').forEach(function (el) {
          el.addEventListener('click', closeCmdk)
        })
        cmdkInput.addEventListener('input', function (e) { active = 0; render(e.target.value) })
        cmdkInput.addEventListener('keydown', function (e) {
          var items = cmdkList.querySelectorAll('.cmdk-item')
          if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active + 1, items.length - 1); render(cmdkInput.value) }
          else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); render(cmdkInput.value) }
          else if (e.key === 'Enter') {
            e.preventDefault()
            var sel = items[active]
            if (sel) location.href = sel.dataset.href
          }
        })
      }
      document.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault()
          if (cmdk && cmdk.hidden) openCmdk(); else closeCmdk()
        }
      })

      /* Expose closeCmdk so the Escape handler above can reach it.
         Declared late so it's safe across all return paths. */
      window.__cmdkClose = closeCmdk
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setup, { once: true })
    } else {
      setup()
    }
  })()
  </script>
</nav>
