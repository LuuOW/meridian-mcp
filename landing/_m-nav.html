<nav class="m-nav">
  <a href="https://ask-meridian.uk/" class="m-brand"><span class="m-glyph">◎</span>Meridian</a>
  <button class="m-burger" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="m-navmenu">
    <span></span><span></span><span></span>
  </button>
  <div id="m-navmenu" class="m-nav-menu" role="menu">
    <a href="https://ask-meridian.uk/">Home</a>

    <details class="m-nav-group" open>
      <summary><span class="m-nav-section">Showcase</span></summary>
      {{SHOWCASE}}
    </details>

    <details class="m-nav-group">
      <summary><span class="m-nav-section">Resources</span></summary>
      {{RESOURCES}}
    </details>

    <details class="m-nav-group">
      <summary><span class="m-nav-section">Source</span></summary>
      {{SOURCE}}
    </details>
  </div>

  <!-- Self-contained burger + cross-host current-link marker. -->
  <script>
  (function () {
    function setup() {
      var btn  = document.querySelector('.m-burger')
      var menu = document.getElementById('m-navmenu')
      if (!btn || !menu) return
      if (btn.dataset.wired) return
      btn.dataset.wired = '1'

      function toggle(open) {
        var isOpen = open === undefined ? !menu.classList.contains('open') : open
        menu.classList.toggle('open', isOpen)
        btn.classList.toggle('open', isOpen)
        btn.setAttribute('aria-expanded', String(isOpen))
      }
      btn.addEventListener('click', function () { toggle() })
      menu.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () { toggle(false) })
      })
      document.addEventListener('click', function (e) {
        if (!menu.classList.contains('open')) return
        if (!menu.contains(e.target) && !btn.contains(e.target)) toggle(false)
      })
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') toggle(false)
      })

      var here = location.host + location.pathname.replace(/\/index\.html$/, '/')
      menu.querySelectorAll('a').forEach(function (a) {
        var href = a.getAttribute('href')
        if (!href) return
        try {
          var u = new URL(href, location.href)
          var target = u.host + u.pathname.replace(/\/index\.html$/, '/')
          if (target === here) a.classList.add('current')
        } catch (_) {}
      })
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setup, { once: true })
    } else {
      setup()
    }
  })()
  </script>
</nav>
