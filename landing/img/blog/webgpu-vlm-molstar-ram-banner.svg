<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070D1A"/>
      <stop offset="55%" stop-color="#0F1F38"/>
      <stop offset="100%" stop-color="#070D1A"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A3358" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1A3358" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="winGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lessonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <ellipse cx="960" cy="540" rx="900" ry="500" fill="url(#centerGlow)"/>

  <!-- Starfield -->
  <g fill="#F5F1E8">
    <circle cx="120" cy="80" r="1.4" fill-opacity="0.5"/>
    <circle cx="280" cy="155" r="1.0" fill-opacity="0.35"/>
    <circle cx="450" cy="60" r="1.2" fill-opacity="0.5"/>
    <circle cx="610" cy="120" r="0.9" fill-opacity="0.3"/>
    <circle cx="790" cy="75" r="1.5" fill-opacity="0.55"/>
    <circle cx="1180" cy="55" r="1.1" fill-opacity="0.4"/>
    <circle cx="1340" cy="95" r="1.6" fill-opacity="0.6"/>
    <circle cx="1700" cy="65" r="1.0" fill-opacity="0.35"/>
    <circle cx="1850" cy="140" r="1.1" fill-opacity="0.4"/>
    <circle cx="80" cy="320" r="1.0" fill-opacity="0.4"/>
    <circle cx="60" cy="720" r="1.0" fill-opacity="0.35"/>
    <circle cx="1880" cy="600" r="1.3" fill-opacity="0.5"/>
    <circle cx="280" cy="950" r="1.2" fill-opacity="0.45"/>
    <circle cx="1640" cy="1020" r="0.9" fill-opacity="0.35"/>
  </g>

  <!-- ===== TOP TAG: BUILD-AND-PIVOT ===== -->
  <g transform="translate(140, 130)">
    <rect x="0" y="-22" width="270" height="44" rx="22"
          fill="#D4A574" fill-opacity="0.10"
          stroke="#D4A574" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="32" cy="0" r="4" fill="#D4A574"/>
    <text x="48" y="6" text-anchor="start"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="15" font-weight="600"
          letter-spacing="4"
          fill="#D4A574">BUILD-AND-PIVOT</text>
  </g>

  <!-- ===== HEADLINE ===== -->
  <text x="140" y="270"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="68" font-weight="300"
        letter-spacing="-1.2"
        fill="#F5F1E8">Render on the client.</text>
  <text x="140" y="360"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="68" font-weight="300" font-style="italic"
        letter-spacing="-1.2"
        fill="#D4A574">Infer on the server.</text>

  <!-- Rule + Subhead -->
  <line x1="140" y1="410" x2="200" y2="410" stroke="#D4A574" stroke-width="1.4"/>
  <text x="140" y="453"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="22" font-weight="300"
        letter-spacing="0.3"
        fill="#A8B5C7">Tried to run a 1.1 GB vision model in your browser.</text>
  <text x="140" y="485"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="22" font-weight="300"
        letter-spacing="0.3"
        fill="#A8B5C7">Most laptops have 16 GB of RAM. Here's what shipped.</text>

  <!-- ===== LESSON CALLOUT (left) ===== -->
  <g transform="translate(140, 575)">
    <rect x="0" y="0" width="700" height="290" rx="6" fill="#0A1628" fill-opacity="0.5" stroke="#1A2D4A" stroke-width="1"/>
    <ellipse cx="180" cy="160" rx="220" ry="120" fill="url(#lessonGlow)"/>

    <text x="28" y="42"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="13" font-weight="600"
          letter-spacing="3.5"
          fill="#5A6A82">THE  RECEIPTS</text>

    <!-- Three quant rows -->
    <g font-family="'Helvetica Neue', 'Arial', sans-serif">
      <text x="28" y="95" font-size="22" font-weight="500" fill="#F5F1E8">1.1 GB on disk</text>
      <text x="350" y="95" font-size="20" font-weight="300" fill="#A8B5C7">→ 3–4× in memory</text>

      <text x="28" y="145" font-size="22" font-weight="500" fill="#F5F1E8">First inference run</text>
      <text x="350" y="145" font-size="20" font-weight="300" fill="#A8B5C7">→ crashed 16 GB Macs</text>

      <text x="28" y="195" font-size="22" font-weight="500" fill="#D4A574">500 MB threshold</text>
      <text x="350" y="195" font-size="20" font-weight="300" fill="#A8B5C7">→ the empirical limit</text>
    </g>

    <line x1="28" y1="225" x2="672" y2="225" stroke="#1A2D4A" stroke-width="1"/>
    <text x="28" y="258"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="14" font-weight="400"
          letter-spacing="0.5"
          fill="#A8B5C7">Mol*  ·  Three.js  ·  SmolVLM  ·  OPFS  ·  GitHub Models</text>
  </g>

  <!-- ===== RIGHT: 2×2 DECISION MATRIX ===== -->
  <g transform="translate(960, 200)">
    <!-- Section header -->
    <text x="0" y="0"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="13" font-weight="600"
          letter-spacing="4"
          fill="#5A6A82">DECISION  MATRIX  ·  WHERE  INFERENCE  RUNS</text>
    <line x1="0" y1="20" x2="820" y2="20" stroke="#1A2D4A" stroke-width="1"/>

    <!-- COLUMN HEADERS -->
    <text x="316" y="70" text-anchor="middle"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="17" font-weight="500"
          letter-spacing="0.5"
          fill="#A8B5C7">Model ≤ 500 MB</text>
    <text x="675" y="70" text-anchor="middle"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="17" font-weight="500"
          letter-spacing="0.5"
          fill="#A8B5C7">Model &gt; 500 MB</text>

    <!-- ROW HEADERS -->
    <text x="125" y="232" text-anchor="end"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="17" font-weight="500"
          letter-spacing="0.5"
          fill="#A8B5C7">Latency-critical</text>
    <text x="125" y="255" text-anchor="end"
          font-family="'SF Mono', monospace"
          font-size="11" font-weight="400"
          letter-spacing="1"
          fill="#5A6A82">VR, interactive 3D</text>

    <text x="125" y="442" text-anchor="end"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="17" font-weight="500"
          letter-spacing="0.5"
          fill="#A8B5C7">Latency-tolerant</text>
    <text x="125" y="465" text-anchor="end"
          font-family="'SF Mono', monospace"
          font-size="11" font-weight="400"
          letter-spacing="1"
          fill="#5A6A82">one-shot Q&amp;A</text>

    <!-- CELL: TOP-LEFT — BROWSER ✓ (winner, gold) -->
    <g transform="translate(150, 100)">
      <rect x="-8" y="-8" width="349" height="216" rx="10" fill="url(#winGlow)"/>
      <rect x="0" y="0" width="333" height="200" rx="6" fill="#0A1628" fill-opacity="0.75" stroke="#D4A574" stroke-width="2"/>

      <text x="22" y="42" font-family="'SF Mono', monospace" font-size="11" font-weight="700" letter-spacing="3" fill="#D4A574">✓  BROWSER</text>
      <text x="22" y="100" font-family="'Helvetica Neue', sans-serif" font-size="40" font-weight="400" letter-spacing="-0.5" fill="#D4A574">lens</text>
      <text x="22" y="138" font-family="'SF Mono', monospace" font-size="14" letter-spacing="1" fill="#A8B5C7">SmolVLM-500M  ·  WebXR</text>
      <line x1="22" y1="155" x2="80" y2="155" stroke="#D4A574" stroke-width="1" stroke-opacity="0.6"/>
      <text x="22" y="180" font-family="'Helvetica Neue', sans-serif" font-size="14" font-weight="300" font-style="italic" fill="#F5F1E8">VR presence kills network hops</text>
    </g>

    <!-- CELL: TOP-RIGHT — SERVER + lighter local -->
    <g transform="translate(510, 100)">
      <rect x="0" y="0" width="333" height="200" rx="6" fill="#0A1628" fill-opacity="0.45" stroke="#1A2D4A" stroke-width="1.2"/>

      <text x="22" y="42" font-family="'SF Mono', monospace" font-size="11" font-weight="600" letter-spacing="3" fill="#5A6A82">SERVER</text>
      <text x="22" y="100" font-family="'Helvetica Neue', sans-serif" font-size="40" font-weight="300" letter-spacing="-0.5" fill="#A8B5C7">+ light</text>
      <text x="22" y="138" font-family="'SF Mono', monospace" font-size="14" letter-spacing="1" fill="#5A6A82">heavy off-device</text>
      <line x1="22" y1="155" x2="80" y2="155" stroke="#5A6A82" stroke-width="1" stroke-opacity="0.6"/>
      <text x="22" y="180" font-family="'Helvetica Neue', sans-serif" font-size="14" font-weight="300" font-style="italic" fill="#A8B5C7">local fallback if offline</text>
    </g>

    <!-- CELL: BOTTOM-LEFT — SERVER (no first-visit wait) -->
    <g transform="translate(150, 320)">
      <rect x="0" y="0" width="333" height="200" rx="6" fill="#0A1628" fill-opacity="0.45" stroke="#1A2D4A" stroke-width="1.2"/>

      <text x="22" y="42" font-family="'SF Mono', monospace" font-size="11" font-weight="600" letter-spacing="3" fill="#5A6A82">SERVER</text>
      <text x="22" y="100" font-family="'Helvetica Neue', sans-serif" font-size="40" font-weight="300" letter-spacing="-0.5" fill="#A8B5C7">vision-lab</text>
      <text x="22" y="138" font-family="'SF Mono', monospace" font-size="14" letter-spacing="1" fill="#5A6A82">GPT-4o-mini · GH Models</text>
      <line x1="22" y1="155" x2="80" y2="155" stroke="#5A6A82" stroke-width="1" stroke-opacity="0.6"/>
      <text x="22" y="180" font-family="'Helvetica Neue', sans-serif" font-size="14" font-weight="300" font-style="italic" fill="#A8B5C7">no first-visit wait</text>
    </g>

    <!-- CELL: BOTTOM-RIGHT — SERVER (no contest) -->
    <g transform="translate(510, 320)">
      <rect x="0" y="0" width="333" height="200" rx="6" fill="#0A1628" fill-opacity="0.45" stroke="#1A2D4A" stroke-width="1.2"/>

      <text x="22" y="42" font-family="'SF Mono', monospace" font-size="11" font-weight="600" letter-spacing="3" fill="#5A6A82">SERVER</text>
      <text x="22" y="100" font-family="'Helvetica Neue', sans-serif" font-size="40" font-weight="300" letter-spacing="-0.5" fill="#A8B5C7">no contest</text>
      <text x="22" y="138" font-family="'SF Mono', monospace" font-size="14" letter-spacing="1" fill="#5A6A82">heavy + latency-tolerant</text>
      <line x1="22" y1="155" x2="80" y2="155" stroke="#5A6A82" stroke-width="1" stroke-opacity="0.6"/>
      <text x="22" y="180" font-family="'Helvetica Neue', sans-serif" font-size="14" font-weight="300" font-style="italic" fill="#A8B5C7">always route off-device</text>
    </g>

    <!-- LEGEND -->
    <g transform="translate(150, 568)">
      <rect x="0" y="-10" width="22" height="18" rx="3" fill="none" stroke="#D4A574" stroke-width="1.5"/>
      <text x="32" y="4" font-family="'SF Mono', monospace" font-size="12" font-weight="700" letter-spacing="2" fill="#D4A574">BROWSER (1 of 4)</text>
      <rect x="280" y="-10" width="22" height="18" rx="3" fill="none" stroke="#5A6A82" stroke-width="1.5"/>
      <text x="312" y="4" font-family="'SF Mono', monospace" font-size="12" letter-spacing="2" fill="#5A6A82">SERVER (3 of 4)</text>
    </g>
  </g>

  <!-- ===== BOTTOM: MERIDIAN MARK + URL STAMP ===== -->
  <g transform="translate(160, 1010)">
    <ellipse rx="48" ry="14" fill="none" stroke="#F5F1E8" stroke-width="1.4" transform="rotate(-22)"/>
    <ellipse rx="48" ry="14" fill="none" stroke="#D4A574" stroke-width="1.2" transform="rotate(22)" stroke-opacity="0.9"/>
    <circle r="5" fill="#F5F1E8"/>
    <circle r="1.5" fill="#070D1A"/>
    <text x="78" y="6"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="20" font-weight="400"
          letter-spacing="0.5"
          fill="#F5F1E8">Meridian</text>
  </g>

  <g transform="translate(1800, 1010)">
    <text x="0" y="-2" text-anchor="end"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="14" font-weight="400"
          letter-spacing="2"
          fill="#5A6A82">/blog/webgpu-vlm-molstar-ram-pivot</text>
    <text x="0" y="22" text-anchor="end"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="17" font-weight="500"
          letter-spacing="3"
          fill="#D4A574">ASK-MERIDIAN.UK</text>
  </g>
</svg>
