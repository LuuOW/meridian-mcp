<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070D1A"/>
      <stop offset="55%" stop-color="#0F1F38"/>
      <stop offset="100%" stop-color="#070D1A"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A3358" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1A3358" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meridianGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5F1E8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#F5F1E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="appleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3C0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7DD3C0" stop-opacity="0"/>
    </radialGradient>

    <!-- Apple logo silhouette (from Apple Developer Design Resources, unmodified) -->
    <symbol id="appleLogo" viewBox="18 14 20 22">
      <path d="M28.2226562,20.3846154 C29.0546875,20.3846154 30.0976562,19.8048315 30.71875,19.0317864 C31.28125,18.3312142 31.6914062,17.352829 31.6914062,16.3744437 C31.6914062,16.2415766 31.6796875,16.1087095 31.65625,16 C30.7304687,16.0362365 29.6171875,16.640178 28.9492187,17.4494596 C28.421875,18.06548 27.9414062,19.0317864 27.9414062,20.0222505 C27.9414062,20.1671964 27.9648438,20.3121424 27.9765625,20.3604577 C28.0351562,20.3725366 28.1289062,20.3846154 28.2226562,20.3846154 Z M25.2929688,35 C26.4296875,35 26.9335938,34.214876 28.3515625,34.214876 C29.7929688,34.214876 30.109375,34.9758423 31.375,34.9758423 C32.6171875,34.9758423 33.4492188,33.792117 34.234375,32.6325493 C35.1132812,31.3038779 35.4765625,29.9993643 35.5,29.9389701 C35.4179688,29.9148125 33.0390625,28.9122695 33.0390625,26.0979021 C33.0390625,23.6579784 34.9140625,22.5588048 35.0195312,22.474253 C33.7773438,20.6382708 31.890625,20.5899555 31.375,20.5899555 C29.9804688,20.5899555 28.84375,21.4596313 28.1289062,21.4596313 C27.3554688,21.4596313 26.3359375,20.6382708 25.1289062,20.6382708 C22.8320312,20.6382708 20.5,22.5950413 20.5,26.2911634 C20.5,28.5861411 21.3671875,31.013986 22.4335938,32.5842339 C23.3476562,33.9129053 24.1445312,35 25.2929688,35 Z"/>
    </symbol>

    <!-- Single chip glyph — package + die + cores + pins -->
    <symbol id="chip" viewBox="-60 -60 120 120">
      <g stroke="#D4A574" stroke-width="2.5" stroke-linecap="round">
        <line x1="-50" y1="-32" x2="-60" y2="-32"/>
        <line x1="-50" y1="-12" x2="-60" y2="-12"/>
        <line x1="-50" y1="8"   x2="-60" y2="8"/>
        <line x1="-50" y1="28"  x2="-60" y2="28"/>
        <line x1="50"  y1="-32" x2="60"  y2="-32"/>
        <line x1="50"  y1="-12" x2="60"  y2="-12"/>
        <line x1="50"  y1="8"   x2="60"  y2="8"/>
        <line x1="50"  y1="28"  x2="60"  y2="28"/>
        <line x1="-32" y1="-50" x2="-32" y2="-60"/>
        <line x1="-12" y1="-50" x2="-12" y2="-60"/>
        <line x1="8"   y1="-50" x2="8"   y2="-60"/>
        <line x1="28"  y1="-50" x2="28"  y2="-60"/>
        <line x1="-32" y1="50"  x2="-32" y2="60"/>
        <line x1="-12" y1="50"  x2="-12" y2="60"/>
        <line x1="8"   y1="50"  x2="8"   y2="60"/>
        <line x1="28"  y1="50"  x2="28"  y2="60"/>
      </g>
      <rect x="-50" y="-50" width="100" height="100" rx="10" fill="#0A1628" fill-opacity="0.6" stroke="#D4A574" stroke-width="3"/>
      <rect x="-28" y="-28" width="56" height="56" rx="4" fill="#D4A574" fill-opacity="0.18" stroke="#D4A574" stroke-width="1.6"/>
      <g fill="#D4A574">
        <circle cx="-15" cy="-15" r="3"/>
        <circle cx="0"   cy="-15" r="3"/>
        <circle cx="15"  cy="-15" r="3"/>
        <circle cx="-15" cy="0"   r="3"/>
        <circle cx="0"   cy="0"   r="3"/>
        <circle cx="15"  cy="0"   r="3"/>
        <circle cx="-15" cy="15"  r="3"/>
        <circle cx="0"   cy="15"  r="3"/>
        <circle cx="15"  cy="15"  r="3"/>
      </g>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <ellipse cx="960" cy="540" rx="900" ry="500" fill="url(#centerGlow)"/>

  <!-- Starfield -->
  <g fill="#F5F1E8">
    <circle cx="120" cy="80"  r="1.4" fill-opacity="0.5"/>
    <circle cx="280" cy="155" r="1.0" fill-opacity="0.35"/>
    <circle cx="450" cy="60"  r="1.2" fill-opacity="0.5"/>
    <circle cx="610" cy="120" r="0.9" fill-opacity="0.3"/>
    <circle cx="790" cy="75"  r="1.5" fill-opacity="0.55"/>
    <circle cx="1180" cy="55" r="1.1" fill-opacity="0.4"/>
    <circle cx="1340" cy="95" r="1.6" fill-opacity="0.6"/>
    <circle cx="1700" cy="65" r="1.0" fill-opacity="0.35"/>
    <circle cx="1850" cy="140" r="1.1" fill-opacity="0.4"/>
    <circle cx="80" cy="320"  r="1.0" fill-opacity="0.4"/>
    <circle cx="60" cy="720"  r="1.0" fill-opacity="0.35"/>
    <circle cx="1880" cy="600" r="1.3" fill-opacity="0.5"/>
    <circle cx="280" cy="950" r="1.2" fill-opacity="0.45"/>
    <circle cx="1640" cy="1020" r="0.9" fill-opacity="0.35"/>
  </g>

  <!-- ===== TOP TAG ===== -->
  <g transform="translate(960, 130)">
    <rect x="-145" y="-22" width="290" height="44" rx="22"
          fill="#D4A574" fill-opacity="0.10"
          stroke="#D4A574" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="-104" cy="0" r="4" fill="#D4A574"/>
    <text x="-90" y="6" text-anchor="start"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="15" font-weight="600"
          letter-spacing="4"
          fill="#D4A574">BUILD-AND-MEASURE</text>
  </g>

  <!-- ===== HEADLINE ===== -->
  <text x="960" y="270" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="78" font-weight="300"
        letter-spacing="-1.4"
        fill="#F5F1E8">AI on AI silicon.</text>

  <!-- Subhead -->
  <text x="960" y="335" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="24" font-weight="300" font-style="italic"
        letter-spacing="0.3"
        fill="#D4A574">217 of 217 ops landed where they belong.</text>

  <!-- ============================================================ -->
  <!-- ===== MAIN COMPOSITION: MERIDIAN → CONNECTOR → APPLE ===== -->
  <!-- ============================================================ -->

  <!-- LEFT: Meridian orbital mark -->
  <g transform="translate(490, 660)">
    <circle r="125" fill="url(#meridianGlow)"/>
    <circle r="160" fill="none" stroke="#1A2D4A" stroke-width="1.2"/>

    <g stroke="#F5F1E8" stroke-width="1.8" stroke-linecap="round">
      <line x1="0" y1="-165" x2="0" y2="-153"/>
      <line x1="0" y1="153" x2="0" y2="165"/>
      <line x1="-165" y1="0" x2="-153" y2="0"/>
      <line x1="153" y1="0" x2="165" y2="0"/>
    </g>
    <line x1="0" y1="-177" x2="0" y2="177" stroke="#F5F1E8" stroke-width="0.7" stroke-opacity="0.25"/>

    <ellipse rx="148" ry="42" fill="none" stroke="#F5F1E8" stroke-width="2.2" transform="rotate(-22)"/>
    <ellipse rx="148" ry="42" fill="none" stroke="#D4A574" stroke-width="1.9" transform="rotate(22)" stroke-opacity="0.9"/>

    <circle cx="137.2" cy="-55.4" r="6" fill="#F5F1E8"/>
    <circle cx="-137.2" cy="-55.4" r="5" fill="#D4A574"/>
    <circle cx="-137.2" cy="55.4" r="3.5" fill="#F5F1E8" fill-opacity="0.55"/>
    <circle cx="137.2" cy="55.4" r="3.5" fill="#D4A574" fill-opacity="0.55"/>

    <circle r="14" fill="#F5F1E8"/>
    <circle r="4.5" fill="#070D1A"/>

    <text x="0" y="230" text-anchor="middle"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="28" font-weight="400"
          letter-spacing="1"
          fill="#F5F1E8">Meridian</text>
    <text x="0" y="262" text-anchor="middle"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="13" font-weight="400"
          letter-spacing="3"
          fill="#5A6A82">SKILL  ROUTER</text>
  </g>

  <!-- CENTER: Connector + proof label -->
  <g>
    <!-- Backing line -->
    <line x1="660" y1="660" x2="1260" y2="660" stroke="#1A2D4A" stroke-width="2"/>
    <!-- Active dashed segments -->
    <line x1="660" y1="660" x2="930" y2="660" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 6" stroke-opacity="0.85"/>
    <line x1="990" y1="660" x2="1260" y2="660" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 6" stroke-opacity="0.85"/>

    <!-- Node in the middle -->
    <circle cx="960" cy="660" r="26" fill="url(#dotPulse)"/>
    <circle cx="960" cy="660" r="13" fill="#0F1F38" stroke="#7DD3C0" stroke-width="1.8"/>
    <circle cx="960" cy="660" r="3.5" fill="#7DD3C0"/>

    <!-- Proof label above the line -->
    <text x="960" y="595" text-anchor="middle"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="44" font-weight="500"
          letter-spacing="-0.5"
          fill="#D4A574">100%</text>
    <text x="960" y="625" text-anchor="middle"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="12" font-weight="600"
          letter-spacing="3"
          fill="#A8B5C7">RUNTIME  PLACEMENT</text>

    <!-- Sub-label below the line -->
    <text x="960" y="710" text-anchor="middle"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="14" font-weight="500"
          letter-spacing="2"
          fill="#5A6A82">217 / 217 ops  ·  0 CPU  ·  0 GPU</text>
  </g>

  <!-- RIGHT: Apple silicon composition (Apple logo above chip glyph) -->
  <g transform="translate(1430, 660)">
    <!-- Gold glow envelope -->
    <ellipse cx="0" cy="20" rx="200" ry="170" fill="url(#appleGlow)"/>

    <!-- Apple logo on top -->
    <use href="#appleLogo" x="-45" y="-180" width="90" height="100" fill="#F5F1E8"/>

    <!-- Chip glyph below -->
    <use href="#chip" x="-80" y="-60" width="160" height="160"/>

    <!-- Labels below the chip -->
    <text x="0" y="190" text-anchor="middle"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="28" font-weight="500"
          letter-spacing="-0.5"
          fill="#D4A574">Apple Neural Engine</text>
    <text x="0" y="222" text-anchor="middle"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="13" font-weight="500"
          letter-spacing="3"
          fill="#5A6A82">M-SERIES  ·  iOS 18  ·  ANE</text>
  </g>

  <!-- ===== BOTTOM: TRADEMARK + BRAND CHROME ===== -->

  <!-- Trademark attribution -->
  <text x="960" y="950" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="11" font-weight="400"
        letter-spacing="0.4"
        fill="#5A6A82">Apple, the Apple logo, and Apple Neural Engine are trademarks of Apple Inc., registered in the U.S. and other countries. Meridian is not affiliated with Apple.</text>

  <!-- Mini Meridian mark + label (bottom-left, the brand chrome) -->
  <g transform="translate(160, 1010)">
    <ellipse rx="48" ry="14" fill="none" stroke="#F5F1E8" stroke-width="1.4" transform="rotate(-22)"/>
    <ellipse rx="48" ry="14" fill="none" stroke="#D4A574" stroke-width="1.2" transform="rotate(22)" stroke-opacity="0.9"/>
    <circle r="5" fill="#F5F1E8"/>
    <circle r="1.5" fill="#070D1A"/>
    <text x="78" y="6"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="20" font-weight="400"
          letter-spacing="0.5"
          fill="#F5F1E8">Meridian</text>
  </g>

  <!-- API stamp (centered) -->
  <text x="960" y="1016" text-anchor="middle"
        font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
        font-size="14" font-style="italic"
        letter-spacing="0.5"
        fill="#5A6A82">MLComputePlan.deviceUsage(for: op).preferred</text>

  <!-- URL stamp (right) -->
  <g transform="translate(1800, 1010)">
    <text x="0" y="-2" text-anchor="end"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="14" font-weight="400"
          letter-spacing="2"
          fill="#5A6A82">/blog/apple-neural-engine-eligibility-vs-placement</text>
    <text x="0" y="22" text-anchor="end"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="17" font-weight="500"
          letter-spacing="3"
          fill="#D4A574">ASK-MERIDIAN.UK</text>
  </g>
</svg>
