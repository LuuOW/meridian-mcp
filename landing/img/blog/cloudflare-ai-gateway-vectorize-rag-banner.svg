<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0" />
      <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="20%" stop-color="#f59e0b"/>
      <stop offset="40%" stop-color="#10b981"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff" fill-opacity="0.15"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>
  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-140" y="-18" width="280" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-110" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">ARXIV BRIEFING</text>
    </g>
    <text font-size="56" font-weight="800" fill="#ffffff" letter-spacing="5">QUANTUM</text>
    <text y="85" font-size="56" font-weight="800" fill="url(#goldText)" letter-spacing="5">REAL RAG WITH CLOUDFLARE</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">Real RAG with Cloudflare Vectorize + AI Gateway in 80 lines</text>
  </g>

  
  <g transform="translate(960, 720)">
    <!-- panel frame -->
    <rect x="-560" y="-220" width="1120" height="380" rx="14" fill="rgba(15,23,42,0.65)" stroke="#a78bfa" stroke-opacity="0.35"/>
    <text x="-540" y="-190" font-family="monospace" font-size="14" fill="#a78bfa" letter-spacing="2">QUANTUM CIRCUIT</text>

    <!-- 4 qubit lines -->
    
      <line x1="-440" y1="-90" x2="440" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.4"/>
    
      <line x1="-440" y1="-30" x2="440" y2="-30" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.4"/>
    
      <line x1="-440" y1="30" x2="440" y2="30" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.4"/>
    
      <line x1="-440" y1="90" x2="440" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.4"/>
    

    <!-- H gates -->
    
      <g transform="translate(-380, -90)">
        <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#a78bfa" stroke="#a78bfa"/>
        <text y="6" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0a1625" text-anchor="middle">H</text>
      </g>
    
      <g transform="translate(-380, -30)">
        <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#a78bfa" stroke="#a78bfa"/>
        <text y="6" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0a1625" text-anchor="middle">H</text>
      </g>
    
      <g transform="translate(-380, 30)">
        <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#a78bfa" stroke="#a78bfa"/>
        <text y="6" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0a1625" text-anchor="middle">H</text>
      </g>
    
      <g transform="translate(-380, 90)">
        <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#a78bfa" stroke="#a78bfa"/>
        <text y="6" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0a1625" text-anchor="middle">H</text>
      </g>
    

    <!-- Rz gates with parameter slots -->
    
      <g transform="translate(-220, -90)" filter="url(#glow)">
        <rect x="-44" y="-22" width="88" height="44" rx="6" fill="#38bdf8" stroke="#38bdf8"/>
        <text y="6" font-family="monospace" font-size="14" font-weight="bold" fill="#0a1625" text-anchor="middle">R$_z$(θ$_1$)</text>
      </g>
    
      <g transform="translate(-220, -30)" filter="url(#glow)">
        <rect x="-44" y="-22" width="88" height="44" rx="6" fill="#38bdf8" stroke="#38bdf8"/>
        <text y="6" font-family="monospace" font-size="14" font-weight="bold" fill="#0a1625" text-anchor="middle">R$_z$(θ$_2$)</text>
      </g>
    
      <g transform="translate(-220, 30)" filter="url(#glow)">
        <rect x="-44" y="-22" width="88" height="44" rx="6" fill="#38bdf8" stroke="#38bdf8"/>
        <text y="6" font-family="monospace" font-size="14" font-weight="bold" fill="#0a1625" text-anchor="middle">R$_z$(θ$_3$)</text>
      </g>
    
      <g transform="translate(-220, 90)" filter="url(#glow)">
        <rect x="-44" y="-22" width="88" height="44" rx="6" fill="#38bdf8" stroke="#38bdf8"/>
        <text y="6" font-family="monospace" font-size="14" font-weight="bold" fill="#0a1625" text-anchor="middle">R$_z$(θ$_4$)</text>
      </g>
    

    <!-- CNOT block -->
    <g transform="translate(0, 0)">
      <rect x="-50" y="-130" width="100" height="260" rx="8" fill="rgba(139,92,246,0.18)" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="-40" y1="-90" x2="40" y2="-90" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1"/>
      <line x1="-40" y1="-30" x2="40" y2="-30" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1"/>
      <line x1="-40" y1="30" x2="40" y2="30" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1"/>
      <line x1="-40" y1="90" x2="40" y2="90" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1"/>
      <circle cx="0" cy="-90" r="6" fill="#0a1625" stroke="#ffffff" stroke-width="2"/>
      <line x1="0" y1="-84" x2="0" y2="84" stroke="#ffffff" stroke-width="2"/>
      <circle cx="0" cy="90" r="6" fill="#0a1625" stroke="#ffffff" stroke-width="2"/>
      <text x="0" y="160" font-family="sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle">CNOT LAYER</text>
    </g>

    <!-- Measurement icons -->
    
      <g transform="translate(280, -90)">
        <path d="M -16,-16 L 16,-16 L 16,16 L -16,16 Z" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
        <path d="M -10,16 A 12 12 0 0 0 10 16" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
        <line x1="0" y1="2" x2="0" y2="14" stroke="#38bdf8" stroke-width="1.6"/>
      </g>
    
      <g transform="translate(280, -30)">
        <path d="M -16,-16 L 16,-16 L 16,16 L -16,16 Z" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
        <path d="M -10,16 A 12 12 0 0 0 10 16" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
        <line x1="0" y1="2" x2="0" y2="14" stroke="#38bdf8" stroke-width="1.6"/>
      </g>
    
      <g transform="translate(280, 30)">
        <path d="M -16,-16 L 16,-16 L 16,16 L -16,16 Z" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
        <path d="M -10,16 A 12 12 0 0 0 10 16" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
        <line x1="0" y1="2" x2="0" y2="14" stroke="#38bdf8" stroke-width="1.6"/>
      </g>
    
      <g transform="translate(280, 90)">
        <path d="M -16,-16 L 16,-16 L 16,16 L -16,16 Z" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
        <path d="M -10,16 A 12 12 0 0 0 10 16" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
        <line x1="0" y1="2" x2="0" y2="14" stroke="#38bdf8" stroke-width="1.6"/>
      </g>
    

    <!-- Classical register lanes -->
    
      <line x1="320" y1="-90" x2="440" y2="-90" stroke="#38bdf8" stroke-opacity="0.4" stroke-dasharray="6,4" stroke-width="1.2"/>
    
      <line x1="320" y1="-30" x2="440" y2="-30" stroke="#38bdf8" stroke-opacity="0.4" stroke-dasharray="6,4" stroke-width="1.2"/>
    
      <line x1="320" y1="30" x2="440" y2="30" stroke="#38bdf8" stroke-opacity="0.4" stroke-dasharray="6,4" stroke-width="1.2"/>
    
      <line x1="320" y1="90" x2="440" y2="90" stroke="#38bdf8" stroke-opacity="0.4" stroke-dasharray="6,4" stroke-width="1.2"/>
    
  </g>

  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 M 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 M 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/cloudflare-ai-gateway-vectorize-rag/</text>
  </g>
</svg>
