<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0" />
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="20%" stop-color="#f59e0b"/>
      <stop offset="40%" stop-color="#10b981"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff" fill-opacity="0.15"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>
  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-140" y="-18" width="280" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-110" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">ARXIV BRIEFING</text>
    </g>
    <text font-size="56" font-weight="800" fill="#ffffff" letter-spacing="5">MICROMANIPULATION</text>
    <text y="85" font-size="56" font-weight="800" fill="url(#goldText)" letter-spacing="5">PHYSICAL BOUNDS ON OPTICAL</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">Physical Bounds on Optical Micromanipulation: Maximal Stiffness in the Dipole Regime</text>
  </g>

  
  <g transform="translate(960, 720)">
    <text x="-540" y="-220" font-family="monospace" font-size="14" fill="#38bdf8" letter-spacing="2">SYSTEM</text>
    <rect x="-560" y="-200" width="1120" height="380" rx="14" fill="rgba(15,23,42,0.6)" stroke="#38bdf8" stroke-opacity="0.25"/>

    
    <defs>
      <radialGradient id="grad-A" cx="35%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
        <stop offset="60%" stop-color="#0ea5e9" stop-opacity="1"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
      </radialGradient>
    </defs>
    <circle cx="-220" cy="0" r="120" fill="url(#grad-A)" stroke="#0ea5e9" stroke-width="2"/>
    <text x="-220" y="160" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">A</text>
  
    
    <defs>
      <radialGradient id="grad-B" cx="35%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
        <stop offset="60%" stop-color="#38bdf8" stop-opacity="1"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
      </radialGradient>
    </defs>
    <circle cx="220" cy="0" r="120" fill="url(#grad-B)" stroke="#38bdf8" stroke-width="2"/>
    <text x="220" y="160" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">B</text>
  

    <!-- bond between spheres with electron cloud -->
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="100" ry="22" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.4" stroke-dasharray="4,4"/>

    <!-- arrows indicating dynamics -->
    <g transform="translate(-360, -90)">
      <path d="M 0,0 L 0,40" stroke="#38bdf8" stroke-width="2"/>
      <polygon points="-6,34 6,34 0,46" fill="#38bdf8"/>
      <text x="0" y="-8" font-family="monospace" font-size="13" fill="#38bdf8" text-anchor="middle">E₁</text>
    </g>
    <g transform="translate(360, -90)">
      <path d="M 0,0 L 0,40" stroke="#38bdf8" stroke-width="2"/>
      <polygon points="-6,34 6,34 0,46" fill="#38bdf8"/>
      <text x="0" y="-8" font-family="monospace" font-size="13" fill="#38bdf8" text-anchor="middle">E₂</text>
    </g>
  </g>

  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 M 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 M 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/physical-bounds-optical-micromanipulation-maximal-stiffness/</text>
  </g>
</svg>
