<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0" />
      <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="20%" stop-color="#f59e0b"/>
      <stop offset="40%" stop-color="#10b981"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff" fill-opacity="0.15"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>
  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-140" y="-18" width="280" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-110" cy="-2" r="3" fill="#a78bfa"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">ARXIV BRIEFING</text>
    </g>
    <text font-size="56" font-weight="800" fill="#ffffff" letter-spacing="5">QUANTUM MACHINE LEARNING</text>
    <text y="85" font-size="56" font-weight="800" fill="url(#goldText)" letter-spacing="5">QUANTUM KERNELS ARE SPECTRAL</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">Quantum Kernels are Spectral Tensor Networks</text>
  </g>

  
  <g transform="translate(960, 720)">
    <text x="-540" y="-220" font-family="monospace" font-size="14" fill="#a78bfa" letter-spacing="2">TENSOR NETWORK</text>
    <rect x="-560" y="-200" width="1120" height="400" rx="14" fill="rgba(15,23,42,0.6)" stroke="#a78bfa" stroke-opacity="0.25"/>

    <!-- horizontal bond between nodes with bond-dim χ in the middle -->
    <line x1="-440" y1="0" x2="480" y2="0" stroke="#a78bfa" stroke-width="3" filter="url(#glow)"/>
    <text x="20" y="-12" font-family="serif" font-size="22" fill="#a78bfa" text-anchor="middle">χ</text>

    <!-- nodes -->
    
      <g transform="translate(-440, 0)">
        <circle r="34" fill="#7c3aed" stroke="#ffffff" stroke-width="2"/>
        <text y="8" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">T1</text>
        <!-- physical index legs up and down -->
        <line x1="-18" y1="-22" x2="-18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="-22" x2="18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="-18" y1="22" x2="-18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="22" x2="18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <!-- open legs (spectral indices) -->
        <line x1="0" y1="-34" x2="0" y2="-130" stroke="#a78bfa" stroke-width="1.4"/>
        <line x1="0" y1="34" x2="0" y2="130" stroke="#a78bfa" stroke-width="1.4"/>
      </g>
    
      <g transform="translate(-200, 0)">
        <circle r="34" fill="#7c3aed" stroke="#ffffff" stroke-width="2"/>
        <text y="8" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">T2</text>
        <!-- physical index legs up and down -->
        <line x1="-18" y1="-22" x2="-18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="-22" x2="18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="-18" y1="22" x2="-18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="22" x2="18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <!-- open legs (spectral indices) -->
        <line x1="0" y1="-34" x2="0" y2="-130" stroke="#a78bfa" stroke-width="1.4"/>
        <line x1="0" y1="34" x2="0" y2="130" stroke="#a78bfa" stroke-width="1.4"/>
      </g>
    
      <g transform="translate(40, 0)">
        <circle r="34" fill="#7c3aed" stroke="#ffffff" stroke-width="2"/>
        <text y="8" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">T3</text>
        <!-- physical index legs up and down -->
        <line x1="-18" y1="-22" x2="-18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="-22" x2="18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="-18" y1="22" x2="-18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="22" x2="18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <!-- open legs (spectral indices) -->
        <line x1="0" y1="-34" x2="0" y2="-130" stroke="#a78bfa" stroke-width="1.4"/>
        <line x1="0" y1="34" x2="0" y2="130" stroke="#a78bfa" stroke-width="1.4"/>
      </g>
    
      <g transform="translate(280, 0)">
        <circle r="34" fill="#7c3aed" stroke="#ffffff" stroke-width="2"/>
        <text y="8" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">T4</text>
        <!-- physical index legs up and down -->
        <line x1="-18" y1="-22" x2="-18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="-22" x2="18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="-18" y1="22" x2="-18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="22" x2="18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <!-- open legs (spectral indices) -->
        <line x1="0" y1="-34" x2="0" y2="-130" stroke="#a78bfa" stroke-width="1.4"/>
        <line x1="0" y1="34" x2="0" y2="130" stroke="#a78bfa" stroke-width="1.4"/>
      </g>
    
      <g transform="translate(480, 0)">
        <circle r="34" fill="#7c3aed" stroke="#ffffff" stroke-width="2"/>
        <text y="8" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">T5</text>
        <!-- physical index legs up and down -->
        <line x1="-18" y1="-22" x2="-18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="-22" x2="18" y2="-90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="-18" y1="22" x2="-18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <line x1="18" y1="22" x2="18" y2="90" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5"/>
        <!-- open legs (spectral indices) -->
        <line x1="0" y1="-34" x2="0" y2="-130" stroke="#a78bfa" stroke-width="1.4"/>
        <line x1="0" y1="34" x2="0" y2="130" stroke="#a78bfa" stroke-width="1.4"/>
      </g>
    

    <!-- vertical bond splitting T2 into T2a/T2b (decomposition indicator) -->
    <g transform="translate(40, 0)">
      <line x1="0" y1="-34" x2="0" y2="-100" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,4"/>
      <line x1="0" y1="34" x2="0" y2="100" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,4"/>
      <circle cx="0" cy="-110" r="8" fill="#a78bfa"/>
      <circle cx="0" cy="110" r="8" fill="#a78bfa"/>
    </g>

    <text x="-440" y="180" font-family="monospace" font-size="14" fill="#a0afb7">SVD / SPECTRAL DECOMPOSITION</text>
    <text x="280" y="180" font-family="monospace" font-size="14" fill="#a0afb7">BOND DIM χ</text>
  </g>

  <g stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 M 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 M 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/quantum-kernels-spectral-tensor-networks/</text>
  </g>
</svg>
