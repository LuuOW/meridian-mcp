<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>

    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="20%" stop-color="#f59e0b" />
      <stop offset="40%" stop-color="#10b981" />
      <stop offset="60%" stop-color="#3b82f6" />
      <stop offset="80%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="propagationGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0" />
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </linearGradient>

    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff" fill-opacity="0.15"/>
    </pattern>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-140" y="-18" width="280" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-110" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">OPTICS · QUANTUM FLUCTUATIONS</text>
    </g>

    <text font-size="54" font-weight="800" fill="#ffffff" letter-spacing="5">THE QUANTUM SPLIT-STEP FOURIER</text>
    <text y="85" font-size="54" font-weight="800" fill="url(#goldText)" letter-spacing="5">ALGORITHM FOR NONLINEAR WAVEGUIDES</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">BOGOLIUBOV MATRICES · WILLIAMSON MODES · ENTANGLEMENT ENTROPY (arXiv:2606.24643)</text>
  </g>

  <g transform="translate(960, 720)">
    <text x="-540" y="-220" font-family="monospace" font-size="14" fill="#38bdf8" letter-spacing="2">SPLIT-STEP PROPAGATION</text>
    <rect x="-560" y="-200" width="1120" height="380" rx="14" fill="rgba(15,23,42,0.65)" stroke="#38bdf8" stroke-opacity="0.35"/>

    <g font-family="monospace" font-size="11" fill="#a0afb7" text-anchor="middle">
      <text x="-450" y="40">|ψ⟩</text>
      <text x="-450" y="56" font-style="italic">mean field</text>

      <text x="-300" y="20" fill="#fbbf24" letter-spacing="2">NONLINEAR</text>
      <text x="-300" y="36" fill="#fbbf24" font-style="italic" font-size="10">half step · real space</text>
      <rect x="-380" y="-20" width="160" height="80" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-width="1.5" filter="url(#glow)"/>
      <text x="-300" y="22" text-anchor="middle" font-family="serif" font-style="italic" font-size="26" fill="#fbbf24">γ|ψ|²ψ</text>

      <text x="-150" y="20" fill="#38bdf8" letter-spacing="2">DISPERSION</text>
      <text x="-150" y="36" fill="#38bdf8" font-style="italic" font-size="10">full step · Fourier</text>
      <rect x="-230" y="-20" width="160" height="80" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow)"/>
      <text x="-150" y="22" text-anchor="middle" font-family="serif" font-style="italic" font-size="26" fill="#38bdf8">β(ω)·ψ̂</text>

      <text x="0" y="20" fill="#fbbf24" letter-spacing="2">NONLINEAR</text>
      <text x="0" y="36" fill="#fbbf24" font-style="italic" font-size="10">half step · real space</text>
      <rect x="-80" y="-20" width="160" height="80" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="22" text-anchor="middle" font-family="serif" font-style="italic" font-size="26" fill="#fbbf24">γ|ψ|²ψ</text>

      <text x="150" y="20" fill="#38bdf8" letter-spacing="2">DISPERSION</text>
      <text x="150" y="36" fill="#38bdf8" font-style="italic" font-size="10">full step · Fourier</text>
      <rect x="70" y="-20" width="160" height="80" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow)"/>
      <text x="150" y="22" text-anchor="middle" font-family="serif" font-style="italic" font-size="26" fill="#38bdf8">β(ω)·ψ̂</text>

      <text x="300" y="20" fill="#fbbf24" letter-spacing="2">NONLINEAR</text>
      <text x="300" y="36" fill="#fbbf24" font-style="italic" font-size="10">half step · real space</text>
      <rect x="220" y="-20" width="160" height="80" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-width="1.5" filter="url(#glow)"/>
      <text x="300" y="22" text-anchor="middle" font-family="serif" font-style="italic" font-size="26" fill="#fbbf24">γ|ψ|²ψ</text>

      <text x="450" y="20" fill="#38bdf8" letter-spacing="2">DISPERSION</text>
      <text x="450" y="36" fill="#38bdf8" font-style="italic" font-size="10">full step · Fourier</text>
      <rect x="370" y="-20" width="160" height="80" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow)"/>
      <text x="450" y="22" text-anchor="middle" font-family="serif" font-style="italic" font-size="26" fill="#38bdf8">β(ω)·ψ̂</text>

      <line x1="-220" y1="20" x2="-80" y2="20" stroke="url(#propagationGrad)" stroke-width="3"/>
      <line x1="80" y1="20" x2="220" y2="20" stroke="url(#propagationGrad)" stroke-width="3"/>
      <line x1="370" y1="20" x2="510" y2="20" stroke="url(#propagationGrad)" stroke-width="3"/>

      <text x="450" y="56" fill="#a0afb7" font-style="italic">mean field propagates by Strang splitting</text>
    </g>

    <g font-family="monospace" font-size="11" fill="#a0afb7" text-anchor="middle">
      <text x="-450" y="130">δâ, δâ†</text>
      <text x="-450" y="146" font-style="italic">fluctuations</text>

      <rect x="-380" y="100" width="160" height="40" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
      <text x="-300" y="124" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#a78bfa">U₁, V₁</text>

      <rect x="-230" y="100" width="160" height="40" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
      <text x="-150" y="124" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#a78bfa">U₂, V₂</text>

      <rect x="-80" y="100" width="160" height="40" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="124" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#a78bfa">U₃, V₃</text>

      <rect x="70" y="100" width="160" height="40" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
      <text x="150" y="124" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#a78bfa">U₄, V₄</text>

      <rect x="220" y="100" width="160" height="40" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
      <text x="300" y="124" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#a78bfa">U₅, V₅</text>

      <rect x="370" y="100" width="160" height="40" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
      <text x="450" y="124" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#a78bfa">U₆, V₆</text>

      <text x="450" y="160" fill="#a0afb7" font-style="italic">Bogoliubov matrices U, V commute under H_QNL</text>
    </g>
