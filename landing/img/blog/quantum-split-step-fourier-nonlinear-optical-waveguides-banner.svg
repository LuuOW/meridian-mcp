<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Background -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>
    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#0e2236" />
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bgGradient)" />
  <rect width="1920" height="1080" fill="url(#dotPattern)" opacity="0.2" />

  <!-- Top Center: Kicker -->
  <text x="960" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#ffcc00" letter-spacing="2">
    OPTICS · QUANTUM FLUCTUATIONS
  </text>

  <!-- Title -->
  <text x="960" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#ffffff" letter-spacing="2">
    QUANTUM SPLIT-STEP
  </text>
  <text x="960" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#goldGradient)" letter-spacing="2">
    FOURIER ALGORITHM
  </text>

  <!-- Gold Gradient for Title -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="100%" stop-color="#ff8c00" />
    </linearGradient>
  </defs>

  <!-- Subtitle -->
  <text x="960" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#a0a0a0" letter-spacing="1">
    BOGOLIUBOV MATRICES, WILLIAMSON MODES, ENTANGLEMENT ENTROPY
  </text>

  <!-- Split-Step Diagram -->
  <g transform="translate(360, 480)">
    <!-- Real-space propagation blocks -->
    <rect x="0" y="0" width="150" height="50" fill="#1e90ff" />
    <rect x="300" y="0" width="150" height="50" fill="#1e90ff" />
    <rect x="600" y="0" width="150" height="50" fill="#1e90ff" />
    <!-- Fourier-space propagation blocks -->
    <rect x="150" y="100" width="150" height="50" fill="#ff6347" />
    <rect x="450" y="100" width="150" height="50" fill="#ff6347" />
    <rect x="750" y="100" width="150" height="50" fill="#ff6347" />
    <!-- Arrows -->
    <line x1="150" y1="25" x2="150" y2="100" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" />
    <line x1="300" y1="125" x2="300" y2="50" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" />
    <line x1="450" y1="25" x2="450" y2="100" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" />
    <line x1="600" y1="125" x2="600" y2="50" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" />
    <line x1="750" y1="25" x2="750" y2="100" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" />
    <!-- Arrowhead Definition -->
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#ffffff" />
      </marker>
    </defs>
  </g>

  <!-- Inset: Symplectic Eigenvalues -->
  <g transform="translate(1320, 480)">
    <circle cx="50" cy="50" r="50" fill="none" stroke="#ffffff" stroke-width="1" />
    <circle cx="50" cy="0" r="5" fill="#ff0000" />
    <circle cx="90" cy="50" r="5" fill="#00ff00" />
    <circle cx="50" cy="100" r="5" fill="#0000ff" />
    <circle cx="10" cy="50" r="5" fill="#ffff00" />
  </g>

  <!-- Inset: Entropy-vs-Distance Curve -->
  <path d="M1400,620 C1410,610 1420,640 1430,630 1440,620 1450,650 1460,640" fill="none" stroke="#ffcc00" stroke-width="2" />

  <!-- Corner Brackets -->
  <path d="M60,60 H100 V100" fill="none" stroke="#00ffff" stroke-width="2" />
  <path d="M1860,60 H1820 V100" fill="none" stroke="#00ffff" stroke-width="2" />
  <path d="M60,1020 H100 V980" fill="none" stroke="#00ffff" stroke-width="2" />
  <path d="M1860,1020 H1820 V980" fill="none" stroke="#00ffff" stroke-width="2" />

  <!-- Footer -->
  <text x="960" y="1040" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#a0a0a0">
    ask-meridian.uk · /blog/quantum-split-step-fourier-nonlinear-optical-waveguides/
  </text>
</svg>