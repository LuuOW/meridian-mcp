  <g transform="translate(0, 0)">
    <g transform="translate(220, 720)">
      <rect x="-110" y="120" width="220" height="100" rx="10" fill="rgba(15,23,42,0.78)" stroke="#10b981" stroke-opacity="0.4"/>
      <text x="0" y="142" text-anchor="middle" font-family="monospace" font-size="11" fill="#10b981" letter-spacing="2">WILLIAMSON MODES</text>
      <g filter="url(#glow)">
        <circle cx="-70" cy="180" r="6" fill="#10b981"/>
        <circle cx="-35" cy="180" r="5" fill="#10b981" opacity="0.7"/>
        <circle cx="0" cy="180" r="3" fill="#10b981" opacity="0.4"/>
        <circle cx="35" cy="180" r="2" fill="#10b981" opacity="0.2"/>
      </g>
      <text x="0" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0afb7">few modes dominate</text>
    </g>

    <g transform="translate(1700, 720)">
      <rect x="-110" y="120" width="220" height="100" rx="10" fill="rgba(15,23,42,0.78)" stroke="#ef4444" stroke-opacity="0.4"/>
      <text x="0" y="142" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444" letter-spacing="2">ENTROPY GROWTH</text>
      <path d="M -90,200 Q -60,198 -30,192 T 30,180 T 90,160" stroke="url(#spectrumGrad)" stroke-width="2.5" fill="none" filter="url(#glow)"/>
      <circle cx="-90" cy="200" r="3" fill="#ef4444"/>
      <circle cx="-30" cy="192" r="3" fill="#f59e0b"/>
      <circle cx="30" cy="180" r="3" fill="#10b981"/>
      <circle cx="90" cy="160" r="3" fill="#3b82f6"/>
      <text x="0" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0afb7">S_vN increases with z</text>
    </g>
  </g>

  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 L 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 L 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/quantum-split-step-fourier-nonlinear-optical-waveguides/</text>
  </g>
