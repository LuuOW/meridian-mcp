<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <linearGradient id="interactionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.6"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff" fill-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-130" y="-18" width="260" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-100" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">QUANTUM INFORMATION</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">RESOLVING THE EDGE OF A</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">QUANTUM PYRAMID</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">OPTIMAL MEASUREMENTS FOR SYMMETRIC STATE ENSEMBLES (arXiv:2606.14698)</text>
  </g>

  <!-- Quantum Pyramid Visualization -->
  <g transform="translate(960, 680)">
    <!-- Base geometric structure -->
    <path d="M 0,-300 L -300,100 L 300,100 Z" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.3"/>
    <path d="M 0,-300 L 0,150 L -300,100" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4"/>
    <path d="M 0,-300 L 0,150 L 300,100" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4"/>
    
    <!-- State Vectors -->
    <g stroke="#ffffff" stroke-width="3" opacity="0.8">
      <line x1="0" y1="0" x2="0" y2="-200"/> <!-- Top -->
      <line x1="0" y1="0" x2="-180" y2="80"/> <!-- Left -->
      <line x1="0" y1="0" x2="180" y2="80"/> <!-- Right -->
      <line x1="0" y1="0" x2="0" y2="120"/> <!-- Bottom -->
    </g>

    <!-- Information Optimal Point -->
    <circle cx="0" cy="0" r="15" fill="#fbbf24">
      <animate attributeName="r" values="15;20;15" dur="3s" infinite="true"/>
      <animate attributeName="fill-opacity" values="0.8;1;0.8" dur="3s" infinite="true"/>
    </circle>

    <!-- Equation Block: Lambert W Relation -->
    <g transform="translate(0, 220)">
      <rect x="-240" y="-35" width="480" height="70" rx="12" fill="#0f172a" fill-opacity="0.9" stroke="#38bdf8" stroke-opacity="0.4"/>
      <text font-family="'Times New Roman', Times, serif" font-size="26" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
        <tspan font-style="italic">W</tspan>(<tspan font-style="italic">z</tspan>) <tspan font-family="serif">≅</tspan> <tspan font-style="italic">ln</tspan>(<tspan font-style="italic">z</tspan>) - <tspan font-style="italic">ln</tspan>(<tspan font-style="italic">ln</tspan>(<tspan font-style="italic">z</tspan>))
      </text>
    </g>

    <text y="320" font-family="monospace" font-size="18" fill="#a78bfa" text-anchor="middle">PROVING THE ENGLERT-ŘEHÁČEK CONJECTURE</text>
  </g>

  <!-- Technical Brackets -->
  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 L 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 L 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/resolving-edge-quantum-pyramid/</text>
  </g>
</svg>
