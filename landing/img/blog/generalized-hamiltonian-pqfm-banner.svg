<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <linearGradient id="interactionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.6"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(88, 166, 255, 0.15)"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-130" y="-18" width="260" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-100" cy="-2" r="3" fill="#fbbf24"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">QUANTUM COMPUTING</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">GENERALIZED TWO-QUBIT HAMILTONIAN</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">FOR PROJECTIVE FEATURE MAPS</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">UNIFYING LOCAL FIELDS & PAIRWISE INTERACTIONS FOR HIGH-DENSITY ENCODING</text>
  </g>

  <!-- Hamiltonian / PQFM Visualization -->
  <g transform="translate(960, 680)">
    <!-- Qubits -->
    <g transform="translate(-200, 0)">
      <circle cx="0" cy="0" r="80" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
      <circle cx="0" cy="0" r="10" fill="#38bdf8">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" infinite="true"/>
      </circle>
      <text y="120" font-family="monospace" font-size="16" fill="#38bdf8" text-anchor="middle">QUBIT_0</text>
    </g>
    
    <g transform="translate(200, 0)">
      <circle cx="0" cy="0" r="80" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
      <circle cx="0" cy="0" r="10" fill="#a78bfa">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" infinite="true" begin="1s"/>
      </circle>
      <text y="120" font-family="monospace" font-size="16" fill="#a78bfa" text-anchor="middle">QUBIT_1</text>
    </g>

    <!-- Hamiltonian Interaction Link -->
    <path d="M -120,0 L 120,0" stroke="url(#interactionGrad)" stroke-width="4" stroke-dasharray="10,5">
      <animate attributeName="stroke-dashoffset" from="0" to="-30" dur="1s" infinite="true"/>
    </path>
    
    <!-- Hamiltonian Equation Placeholder -->
    <g transform="translate(0, -100)">
      <rect x="-180" y="-30" width="360" height="60" rx="10" fill="rgba(15, 23, 42, 0.8)" stroke="#fbbf24" stroke-opacity="0.3"/>
      <text font-family="monospace" font-size="20" fill="#fbbf24" text-anchor="middle">H = Σ h_i σ_i + Σ J_ij σ_i σ_j</text>
    </g>

    <text y="200" font-family="monospace" font-size="18" fill="#a78bfa" text-anchor="middle">OPTIMIZING INFORMATION DENSITY IN SHALLOW CIRCUITS</text>
  </g>

  <!-- Technical Brackets -->
  <g stroke="var(--accent)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 L 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 L 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/generalized-two-qubit-hamiltonian-pqfm/</text>
  </g>
</svg>
