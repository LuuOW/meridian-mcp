<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070D1A"/>
      <stop offset="55%" stop-color="#0F1F38"/>
      <stop offset="100%" stop-color="#070D1A"/>
    </linearGradient>
    <radialGradient id="meridianGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5F1E8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#F5F1E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="boticaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3FB57A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3FB57A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3C0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7DD3C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A3358" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1A3358" stop-opacity="0"/>
    </radialGradient>
    <!-- Capsule clip-path for the two-tone pill -->
    <clipPath id="capsuleClip">
      <rect x="-25" y="-75" width="50" height="150" rx="25"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <ellipse cx="960" cy="540" rx="900" ry="500" fill="url(#centerGlow)"/>

  <!-- Starfield -->
  <g fill="#F5F1E8">
    <circle cx="120" cy="80" r="1.4" fill-opacity="0.5"/>
    <circle cx="280" cy="155" r="1.0" fill-opacity="0.35"/>
    <circle cx="450" cy="60" r="1.2" fill-opacity="0.5"/>
    <circle cx="610" cy="120" r="0.9" fill-opacity="0.3"/>
    <circle cx="790" cy="75" r="1.5" fill-opacity="0.55"/>
    <circle cx="1180" cy="55" r="1.1" fill-opacity="0.4"/>
    <circle cx="1340" cy="95" r="1.6" fill-opacity="0.6"/>
    <circle cx="1700" cy="65" r="1.0" fill-opacity="0.35"/>
    <circle cx="1850" cy="140" r="1.1" fill-opacity="0.4"/>
    <circle cx="80" cy="320" r="1.0" fill-opacity="0.4"/>
    <circle cx="60" cy="720" r="1.0" fill-opacity="0.35"/>
    <circle cx="1880" cy="600" r="1.3" fill-opacity="0.5"/>
    <circle cx="280" cy="950" r="1.2" fill-opacity="0.45"/>
    <circle cx="500" cy="990" r="0.9" fill-opacity="0.3"/>
    <circle cx="1100" cy="1015" r="1.0" fill-opacity="0.4"/>
    <circle cx="1640" cy="1020" r="0.9" fill-opacity="0.35"/>
    <circle cx="1850" cy="970" r="1.1" fill-opacity="0.4"/>
  </g>

  <!-- ===== TOP TAG: PHARMACY MCP ===== -->
  <g transform="translate(960, 130)">
    <rect x="-130" y="-22" width="260" height="44" rx="22"
          fill="#3FB57A" fill-opacity="0.12"
          stroke="#3FB57A" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="-95" cy="0" r="5" fill="#3FB57A"/>
    <text x="-78" y="6" text-anchor="start"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="16" font-weight="600"
          letter-spacing="4"
          fill="#3FB57A">PHARMACY  MCP</text>
  </g>

  <!-- ===== HEADLINE ===== -->
  <text x="960" y="260" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="78" font-weight="300"
        letter-spacing="-1.4"
        fill="#F5F1E8">Chat to cart.</text>
  <text x="960" y="365" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="78" font-weight="300" font-style="italic"
        letter-spacing="-1.2"
        fill="#3FB57A">Browser to checkout.</text>

  <!-- Subhead -->
  <text x="960" y="445" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="24" font-weight="300"
        letter-spacing="0.3"
        fill="#A8B5C7">Anonymous VTEX cart in-worker. reCAPTCHA Enterprise stays where it works — your browser.</text>

  <!-- ===== CONNECTOR DIAGRAM ===== -->

  <!-- LEFT: Meridian orbital mark -->
  <g transform="translate(620, 720)">
    <circle r="120" fill="url(#meridianGlow)"/>
    <circle r="155" fill="none" stroke="#1A2D4A" stroke-width="1.2"/>

    <g stroke="#F5F1E8" stroke-width="1.8" stroke-linecap="round">
      <line x1="0" y1="-160" x2="0" y2="-148"/>
      <line x1="0" y1="148" x2="0" y2="160"/>
      <line x1="-160" y1="0" x2="-148" y2="0"/>
      <line x1="148" y1="0" x2="160" y2="0"/>
    </g>

    <line x1="0" y1="-172" x2="0" y2="172" stroke="#F5F1E8" stroke-width="0.7" stroke-opacity="0.25"/>

    <ellipse rx="143" ry="40" fill="none" stroke="#F5F1E8" stroke-width="2.2" transform="rotate(-22)"/>
    <ellipse rx="143" ry="40" fill="none" stroke="#D4A574" stroke-width="1.9" transform="rotate(22)" stroke-opacity="0.9"/>

    <circle cx="132.6" cy="-53.6" r="6" fill="#F5F1E8"/>
    <circle cx="-132.6" cy="-53.6" r="5" fill="#D4A574"/>
    <circle cx="-132.6" cy="53.6" r="3.5" fill="#F5F1E8" fill-opacity="0.55"/>
    <circle cx="132.6" cy="53.6" r="3.5" fill="#D4A574" fill-opacity="0.55"/>

    <circle r="14" fill="#F5F1E8"/>
    <circle r="4.5" fill="#070D1A"/>

    <text x="0" y="220" text-anchor="middle"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="26" font-weight="400"
          letter-spacing="1"
          fill="#F5F1E8">Meridian</text>
    <text x="0" y="252" text-anchor="middle"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="13" font-weight="400"
          letter-spacing="3"
          fill="#5A6A82">SKILL  ROUTER</text>
  </g>

  <!-- ===== CENTER: CONNECTING LINE ===== -->
  <g>
    <line x1="800" y1="720" x2="1120" y2="720" stroke="#1A2D4A" stroke-width="2"/>
    <line x1="800" y1="720" x2="940" y2="720" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 6" stroke-opacity="0.85"/>
    <line x1="980" y1="720" x2="1120" y2="720" stroke="#3FB57A" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 6" stroke-opacity="0.85"/>

    <circle cx="960" cy="720" r="22" fill="url(#dotPulse)"/>
    <circle cx="960" cy="720" r="11" fill="#0F1F38" stroke="#7DD3C0" stroke-width="1.8"/>
    <circle cx="960" cy="720" r="3" fill="#7DD3C0"/>
  </g>

  <!-- ===== RIGHT: ORIGINAL BOTICA MARK ===== -->
  <g transform="translate(1300, 720)">
    <!-- Subtle green glow -->
    <circle r="170" fill="url(#boticaGlow)"/>

    <!-- Outer reference circle -->
    <circle r="155" fill="none" stroke="#3FB57A" stroke-width="2" stroke-opacity="0.6"/>

    <!-- Cardinal tick marks (matches Meridian's vocabulary for visual harmony) -->
    <g stroke="#F5F1E8" stroke-width="1.8" stroke-linecap="round">
      <line x1="0" y1="-160" x2="0" y2="-148"/>
      <line x1="0" y1="148" x2="0" y2="160"/>
      <line x1="-160" y1="0" x2="-148" y2="0"/>
      <line x1="148" y1="0" x2="160" y2="0"/>
    </g>

    <!-- Botica mark: vertical two-tone capsule pill -->
    <g clip-path="url(#capsuleClip)">
      <!-- Top half: emerald green -->
      <rect x="-25" y="-75" width="50" height="75" fill="#1F8A4C"/>
      <!-- Bottom half: cream -->
      <rect x="-25" y="0" width="50" height="75" fill="#F5F1E8"/>
    </g>
    <!-- Capsule outline -->
    <rect x="-25" y="-75" width="50" height="150" rx="25" fill="none" stroke="#2A9D5C" stroke-width="2"/>
    <!-- Subtle horizontal line at the seam -->
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#2A9D5C" stroke-width="1" stroke-opacity="0.7"/>

    <!-- Small celestial accent: dot above the capsule (ties to Meridian aesthetic) -->
    <circle cx="0" cy="-110" r="3" fill="#3FB57A" fill-opacity="0.8"/>

    <!-- Wordmark -->
    <text x="0" y="220" text-anchor="middle"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="32" font-weight="400" font-style="italic"
          letter-spacing="2"
          fill="#F5F1E8">Botica</text>
    <text x="0" y="252" text-anchor="middle"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="13" font-weight="400"
          letter-spacing="3"
          fill="#5A6A82">PHARMACY  ·  VTEX</text>
  </g>

  <!-- ===== BOTTOM: URL ===== -->
  <g transform="translate(960, 1010)">
    <line x1="-30" y1="-7" x2="0" y2="-7" stroke="#D4A574" stroke-width="1.2"/>
    <text x="14" y="0" text-anchor="start"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="17" font-weight="500"
          letter-spacing="3"
          fill="#D4A574">ASK-MERIDIAN.UK</text>
  </g>

  <text x="960" y="1050" text-anchor="middle"
        font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
        font-size="13" font-weight="400"
        letter-spacing="2"
        fill="#5A6A82">/blog/pharmacy-mcp-recaptcha-origin-pivot</text>
</svg>
