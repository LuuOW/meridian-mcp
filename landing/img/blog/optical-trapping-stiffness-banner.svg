<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <linearGradient id="beamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(88, 166, 255, 0.15)"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-130" y="-18" width="260" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-100" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">COMPUTATIONAL PHYSICS</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">PHYSICAL BOUNDS ON</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">OPTICAL MICROMANIPULATION</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">MAXIMIZING TRAP STIFFNESS IN THE DIPOLE REGIME (arXiv:2606.09554)</text>
  </g>

  <!-- Optical Trap Visualization -->
  <g transform="translate(960, 640)">
    <!-- Converging Beams -->
    <path d="M -400,-250 L 0,0 L 400,-250" fill="url(#beamGradient)" opacity="0.6"/>
    <path d="M -400,250 L 0,0 L 400,250" fill="url(#beamGradient)" opacity="0.6"/>
    
    <!-- Trap Center -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="10,10" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="20s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Potential Well -->
    <path d="M -200,-50 Q 0,100 200,-50" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
    
    <!-- Stiffness Vectors -->
    <g stroke="#ffffff" stroke-width="3" opacity="0.8">
      <line x1="0" y1="0" x2="0" y2="-60"/>
      <path d="M -10,-50 L 0,-60 L 10,-50" fill="none"/>
      
      <line x1="0" y1="0" x2="0" y2="60"/>
      <path d="M -10,50 L 0,60 L 10,50" fill="none"/>
      
      <line x1="0" y1="0" x2="-60" y2="0"/>
      <path d="M -50,-10 L -60,0 L -50,10" fill="none"/>
      
      <line x1="0" y1="0" x2="60" y2="0"/>
      <path d="M 50,-10 L 60,0 L 50,10" fill="none"/>
    </g>

    <!-- Particle -->
    <circle cx="0" cy="0" r="12" fill="#ffffff">
      <animate attributeName="r" values="12;14;12" dur="2s" infinite="true"/>
      <animate attributeName="fill" values="#ffffff;#38bdf8;#ffffff" dur="2s" infinite="true"/>
    </circle>

    <text y="-180" font-family="monospace" font-size="16" fill="#a78bfa" text-anchor="middle">MAX κ = min eig(K)</text>
  </g>

  <!-- Technical Brackets -->
  <g stroke="var(--accent)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 L 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 L 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/physical-bounds-optical-micromanipulation-maximal-stiffness/</text>
  </g>
</svg>
