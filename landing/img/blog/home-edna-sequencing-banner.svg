<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <radialGradient id="meridianGlow" cx="23%" cy="63%" r="25%">
      <stop offset="0%" stop-color="#1e3d59" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a1625" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="genomicsGlow" cx="70%" cy="63%" r="30%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a1625" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>

    <linearGradient id="helixStream" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.5"/>
    </linearGradient>

    <linearGradient id="sparkStream" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#meridianGlow)"/>
  <rect width="1920" height="1080" fill="url(#genomicsGlow)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-110" y="-18" width="220" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-80" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">COMPUTATIONAL BIOLOGY</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">HOME eDNA SEQUENCING</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">WITH DISTRIBUTED DGX &amp; SPARK</text>
    <text y="170" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">INFRASTRUCTURE</text>
    <text y="245" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">ACCELERATING ENVIRONMENTAL GENOMICS THROUGH COMPUTE CLUSTERS</text>
  </g>

  <g id="horizontal-system">
    
    <g id="connection-track">
      <line x1="540" y1="680" x2="1140" y2="680" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
      <line x1="540" y1="680" x2="1140" y2="680" stroke="#38bdf8" stroke-width="1" stroke-dasharray="12,12" opacity="0.5"/>
      
      <circle cx="840" cy="680" r="16" fill="#38bdf8" opacity="0.15"/>
      <circle cx="840" cy="680" r="10" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
      <circle cx="840" cy="680" r="4" fill="#ffffff"/>
    </g>

    <g id="meridian-node" transform="translate(420, 680)">
      <line x1="0" y1="-130" x2="0" y2="130" stroke="#ffffff" stroke-width="1" opacity="0.1" stroke-dasharray="5,5"/>
      <line x1="-130" y1="0" x2="130" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.1" stroke-dasharray="5,5"/>
      <line x1="0" y1="-130" x2="0" y2="-115" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
      <line x1="0" y1="115" x2="0" y2="130" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
      
      <ellipse cx="0" cy="0" rx="120" ry="42" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.85" transform="rotate(-28)"/>
      <ellipse cx="0" cy="0" rx="120" ry="42" fill="none" stroke="#dfc29e" stroke-width="1.5" stroke-opacity="0.75" transform="rotate(28)"/>
      
      <circle cx="106" cy="-56" r="4" fill="#ffffff"/>
      <circle cx="-106" cy="56" r="3" fill="#dfc29e"/>
      
      <circle cx="0" cy="0" r="24" fill="#0a1625" stroke="#ffffff" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="10" fill="#ffffff"/>
      <circle cx="0" cy="0" r="5" fill="#0a1625"/>

      <text y="175" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="sans-serif" letter-spacing="3">Meridian</text>
      <text y="205" font-size="13" font-weight="600" fill="#718096" text-anchor="middle" font-family="sans-serif" letter-spacing="2">SKILL ROUTER</text>
    </g>

    <g id="sequencer-node" transform="translate(1260, 680)">
      
      <g id="sequencer-graphic">
        <circle cx="0" cy="0" r="70" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,8" opacity="0.3"/>
        <circle cx="0" cy="0" r="58" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

        <path d="M -90,-20 Q -65,-55 -40,-20 T 10,-20 T 60,-20 T 90,-20" fill="none" stroke="url(#helixStream)" stroke-width="2.5"/>
        <path d="M -90,20 Q -65,-15 -40,20 T 10,20 T 60,20 T 90,20" fill="none" stroke="url(#helixStream)" stroke-width="1.5" opacity="0.5"/>
        
        <line x1="-78" y1="-23" x2="-78" y2="10" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
        <line x1="-52" y1="-34" x2="-52" y2="32" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
        <line x1="-28" y1="-20" x2="-28" y2="18" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
        <line x1="-2" y1="-32" x2="-2" y2="34" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
        <line x1="22" y1="-20" x2="22" y2="18" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>

        <g transform="translate(0,0) scale(0.9)">
          <polygon points="0,-40 45,-18 0,4 -45,-18" fill="#1e293b" fill-opacity="0.8" stroke="#38bdf8" stroke-width="1.5"/>
          <polygon points="0,-20 45,2 0,24 -45,2" fill="#0f172a" fill-opacity="0.7" stroke="url(#sparkStream)" stroke-width="1.5"/>
          <polygon points="0,0 45,22 0,44 -45,22" fill="#020617" fill-opacity="0.9" stroke="#f43f5e" stroke-width="1"/>

          <circle cx="-20" cy="-14" r="2.5" fill="#38bdf8"/>
          <circle cx="0" cy="-6" r="2.5" fill="#38bdf8"/>
          <circle cx="20" cy="-14" r="2.5" fill="#ffffff"/>
          
          <circle cx="-20" cy="6" r="2.5" fill="#fb923c"/>
          <circle cx="0" cy="14" r="2.5" fill="#f43f5e"/>
          <circle cx="20" cy="6" r="2.5" fill="#fb923c"/>
        </g>

        <circle cx="-90" cy="-20" r="4.5" fill="#38bdf8"/>
        <circle cx="90" cy="-20" r="4.5" fill="#f43f5e"/>
      </g>

      <g id="brand-text" transform="translate(0, 110)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
        <text font-size="28" font-weight="800" fill="url(#goldText)" letter-spacing="3">DISTRIBUTED SEQUENCING</text>
        <text y="34" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="3">ENGINE</text>
        <text y="68" font-size="12" font-weight="600" fill="#718096" letter-spacing="1.5">DATA INGESTION · SPARK WORKERS · COHORT PROCESSING</text>
      </g>
    </g>

  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/home-edna-sequencing-dgx-spark/</text>
  </g>
</svg>