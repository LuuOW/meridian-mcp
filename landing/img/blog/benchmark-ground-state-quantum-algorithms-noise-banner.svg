<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>

    <linearGradient id="laneAdiabatic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#a78bfa" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="laneCooling" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#38bdf8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="laneQaoa" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#f59e0b" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.0"/>
    </linearGradient>

    <linearGradient id="gapCurve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff" fill-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <!-- Title block -->
  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-140" y="-18" width="280" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-110" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">QUANTUM SIMULATION</text>
    </g>

    <text font-size="56" font-weight="800" fill="#ffffff" letter-spacing="5">BENCHMARK OF QUANTUM ALGORITHMS</text>
    <text y="85" font-size="56" font-weight="800" fill="url(#goldText)" letter-spacing="5">FOR GROUND-STATE PREPARATION</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">ADIABATIC vs COOLING vs QAOA UNDER DEPOLARIZING NOISE (arXiv:2606.20551)</text>
  </g>

  <!-- Three algorithm lanes meeting at a phase transition -->
  <g transform="translate(960, 700)">
    <!-- Phase-transition vertical separator -->
    <line x1="0" y1="-220" x2="0" y2="160" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 6" opacity="0.65"/>
    <text x="0" y="-240" text-anchor="middle" font-family="monospace" font-size="14" fill="#fbbf24" letter-spacing="2">PHASE TRANSITION · g = g_c</text>

    <!-- Top axis label -->
    <text x="-380" y="-180" font-family="monospace" font-size="14" fill="#a0afb7" letter-spacing="2">TRIVIAL PHASE</text>
    <text x="380" y="-180" text-anchor="end" font-family="monospace" font-size="14" fill="#a0afb7" letter-spacing="2">TOPOLOGICAL PHASE</text>

    <!-- Adiabatic lane -->
    <g transform="translate(0, -90)">
      <rect x="-560" y="-22" width="1120" height="44" fill="url(#laneAdiabatic)" opacity="0.18"/>
      <path d="M -540,0 Q -300,-30 -10,0 L 10,-30 Q 300,-80 540,0" stroke="#a78bfa" stroke-width="3" fill="none" opacity="0.95"/>
      <text x="-540" y="-40" font-family="monospace" font-size="14" fill="#c4b5fd" letter-spacing="2">ADIABATIC</text>
      <text x="540" y="-40" text-anchor="end" font-family="monospace" font-size="12" fill="#c4b5fd">favoured when Δ_min ≫ p</text>
    </g>

    <!-- Cooling lane -->
    <g transform="translate(0, 0)">
      <rect x="-560" y="-22" width="1120" height="44" fill="url(#laneCooling)" opacity="0.22"/>
      <path d="M -540,30 Q -200,40 10,0 Q 250,-25 540,-30" stroke="#38bdf8" stroke-width="3" fill="none" opacity="0.95"/>
      <text x="-540" y="60" font-family="monospace" font-size="14" fill="#7dd3fc" letter-spacing="2">COOLING</text>
      <text x="540" y="60" text-anchor="end" font-family="monospace" font-size="12" fill="#7dd3fc">competitive near gap closure</text>
    </g>

    <!-- QAOA lane -->
    <g transform="translate(0, 90)">
      <rect x="-560" y="-22" width="1120" height="44" fill="url(#laneQaoa)" opacity="0.18"/>
      <path d="M -540,-30 Q -250,-20 -10,0 L 10,30 Q 250,55 540,60" stroke="#f59e0b" stroke-width="3" fill="none" opacity="0.9"/>
      <text x="-540" y="-40" font-family="monospace" font-size="14" fill="#fcd34d" letter-spacing="2">QAOA</text>
      <text x="540" y="-40" text-anchor="end" font-family="monospace" font-size="12" fill="#fcd34d">competitive in trivial, loses in topological</text>
    </g>

    <!-- Gap closing curve (below) -->
    <g transform="translate(0, 220)">
      <path d="M -540,0 Q -270,-40 -10,-60 Q 250,-40 540,0" stroke="url(#gapCurve)" stroke-width="3" fill="none"/>
      <text x="0" y="36" text-anchor="middle" font-family="monospace" font-size="14" fill="#a0afb7" letter-spacing="2">Δ_min(g) ~ |g - g_c|^{zν}</text>
    </g>
  </g>

  <!-- Corner markers -->
  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 L 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 L 1870,930"/>
  </g>

  <!-- Footer -->
  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/benchmark-ground-state-quantum-algorithms-noise/</text>
  </g>
</svg>
