<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>
    
    <radialGradient id="quadrupoleGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a1625" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>

    <pattern id="topoGrid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="none" stroke="rgba(167, 139, 250, 0.1)" stroke-width="1"/>
      <circle cx="50" cy="50" r="3" fill="rgba(167, 139, 250, 0.3)"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#quadrupoleGlow)"/>
  <rect width="1920" height="1080" fill="url(#topoGrid)" opacity="0.3"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-140" y="-18" width="280" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-110" cy="-2" r="3" fill="#a78bfa"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">TOPOLOGICAL PHYSICS</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">DIPOLAR &amp; QUADRUPOLAR</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">HIGHER-ORDER TOPOLOGY</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">NESTED WILSON LOOPS &amp; DOUBLY-PROTECTED CORNER STATES</text>
  </g>

  <!-- Central Visualization: Quadrupole Lattice -->
  <g transform="translate(960, 680)">
    <!-- Main Square Lattice -->
    <rect x="-200" y="-200" width="400" height="400" fill="none" stroke="rgba(88, 166, 255, 0.3)" stroke-width="2" stroke-dasharray="10,10"/>
    
    <!-- Corner States (Glows) -->
    <g fill="#a78bfa">
      <circle cx="-200" cy="-200" r="12">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" infinite="true"/>
      </circle>
      <circle cx="200" cy="-200" r="12">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" infinite="true"/>
      </circle>
      <circle cx="-200" cy="200" r="12">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" infinite="true"/>
      </circle>
      <circle cx="200" cy="200" r="12">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" infinite="true"/>
      </circle>
    </g>

    <!-- Polarization Vectors (Dipolar) -->
    <g stroke="#38bdf8" stroke-width="3" opacity="0.6">
      <path d="M -150,-100 H 150" marker-end="url(#arrowBlue)"/>
      <path d="M -150,100 H 150" marker-end="url(#arrowBlue)"/>
    </g>

    <!-- Quadrupole Moment (Tensor) -->
    <rect x="-100" y="-100" width="200" height="200" fill="rgba(167, 139, 250, 0.05)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="5,5"/>
    
    <text y="-240" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">QUANTIZED INVARIANTS: P=1/2 , Qxy=1/2</text>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/dipolar-quadrupolar-topology-coexistence/</text>
  </g>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8" />
    </marker>
  </defs>
</svg>