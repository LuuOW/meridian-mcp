<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <linearGradient id="channelFlow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(88, 166, 255, 0.15)"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-130" y="-18" width="260" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-100" cy="-2" r="3" fill="#a78bfa"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">OPTICAL VISION MODELS</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">MULTI-CHANNEL OPTICAL</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">VISION MODEL (OVM)</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">TRAINABLE SPATIAL MULTIPLEXING AS A REPRESENTATIONAL COORDINATE</text>
  </g>

  <!-- OVM Multi-Channel Visualization -->
  <g transform="translate(960, 680)">
    <!-- Multi-Layer Paths -->
    <g opacity="0.4">
      <path d="M -500,-150 L -300,-150 L -100,-100 L 100,-100 L 300,-150 L 500,-150" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <path d="M -500,-50 L -300,-50 L -100,0 L 100,0 L 300,-50 L 500,-50" fill="none" stroke="#a78bfa" stroke-width="2"/>
      <path d="M -500,50 L -300,50 L -100,100 L 100,100 L 300,50 L 500,50" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <path d="M -500,150 L -300,150 L -100,200 L 100,200 L 300,150 L 500,150" fill="none" stroke="#a78bfa" stroke-width="2"/>
    </g>

    <!-- Phase Modulator Plane -->
    <g transform="translate(0, 0)">
      <rect x="-120" y="-220" width="240" height="440" rx="10" fill="rgba(15, 23, 42, 0.8)" stroke="#ffffff" stroke-opacity="0.2"/>
      <g stroke="#a78bfa" stroke-width="1" opacity="0.5">
        <line x1="-120" y1="-150" x2="120" y2="-150"/>
        <line x1="-120" y1="-100" x2="120" y2="-100"/>
        <line x1="-120" y1="-50" x2="120" y2="-50"/>
        <line x1="-120" y1="0" x2="120" y2="0"/>
        <line x1="-120" y1="50" x2="120" y2="50"/>
        <line x1="-120" y1="100" x2="120" y2="100"/>
        <line x1="-120" y1="150" x2="120" y2="150"/>
      </g>
      <text y="-240" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle">PROGRAMMABLE PHASE_PLANE [1M+ Params]</text>
    </g>

    <!-- Backprop / Surrogate Arrow -->
    <path d="M 400,200 Q 200,300 0,220" fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="10,5">
      <animate attributeName="stroke-dashoffset" from="150" to="0" dur="3s" repeatCount="indefinite"/>
    </path>
    <text x="250" y="320" font-family="monospace" font-size="14" fill="#fbbf24" text-anchor="middle">SURROGATE BACKWARD</text>
  </g>

  <!-- Technical Brackets -->
  <g stroke="var(--accent)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 L 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 L 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/multi-channel-optical-vision-model/</text>
  </g>
</svg>
