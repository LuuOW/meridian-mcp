<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0e1726" />
      <stop offset="60%" stop-color="#080f1a" />
      <stop offset="100%" stop-color="#03060d" />
    </radialGradient>

    <radialGradient id="meridianGlow" cx="23%" cy="63%" r="25%">
      <stop offset="0%" stop-color="#3b0764" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a1625" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="quantumGlow" cx="70%" cy="63%" r="30%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a1625" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>

    <linearGradient id="tealGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="50%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#115e59" />
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#meridianGlow)"/>
  <rect width="1920" height="1080" fill="url(#quantumGlow)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-110" y="-18" width="220" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-80" cy="-2" r="3" fill="#2dd4bf"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">ALTERMANGNETIC OPTICS</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">THE REALIZATION OF AN</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">ORBITAL ALTERMAGNETIC</text>
    <text y="170" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">PHOTONIC CRYSTAL</text>
    <text y="245" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">EXPERIMENTAL VERIFICATION OF MOMENTUM-DEPENDENT PSEUDOSPIN SPLITTING</text>
  </g>

  <g id="horizontal-system">
    
    <g id="connection-track">
      <line x1="540" y1="680" x2="1140" y2="680" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
      <line x1="540" y1="680" x2="1140" y2="680" stroke="#a855f7" stroke-width="1" stroke-dasharray="10,15" opacity="0.6"/>
      
      <circle cx="840" cy="680" r="16" fill="#a855f7" opacity="0.2"/>
      <circle cx="840" cy="680" r="10" fill="none" stroke="#2dd4bf" stroke-width="1.5"/>
      <circle cx="840" cy="680" r="4" fill="#ffffff"/>
    </g>

    <g id="meridian-node" transform="translate(420, 680)">
      <line x1="0" y1="-130" x2="0" y2="130" stroke="#ffffff" stroke-width="1" opacity="0.1" stroke-dasharray="5,5"/>
      <line x1="-130" y1="0" x2="130" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.1" stroke-dasharray="5,5"/>
      <line x1="0" y1="-130" x2="0" y2="-115" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
      <line x1="0" y1="115" x2="0" y2="130" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
      
      <ellipse cx="0" cy="0" rx="120" ry="42" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.85" transform="rotate(-28)"/>
      <ellipse cx="0" cy="0" rx="120" ry="42" fill="none" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.75" transform="rotate(28)"/>
      
      <circle cx="106" cy="-56" r="4" fill="#ffffff"/>
      <circle cx="-106" cy="56" r="3" fill="#2dd4bf"/>
      
      <circle cx="0" cy="0" r="24" fill="#0b0d14" stroke="#ffffff" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="10" fill="#ffffff"/>
      <circle cx="0" cy="0" r="5" fill="#0b0d14"/>

      <text y="175" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="sans-serif" letter-spacing="3">Meridian</text>
      <text y="205" font-size="13" font-weight="600" fill="#718096" text-anchor="middle" font-family="sans-serif" letter-spacing="2">ORBITAL ROUTER</text>
    </g>

    <g id="crystal-node" transform="translate(1260, 680)">
      
      <g id="crystal-grid" transform="translate(0, 0)">
        <circle cx="0" cy="0" r="65" fill="none" stroke="#2dd4bf" stroke-width="1" stroke-dasharray="3,9" opacity="0.4"/>
        <circle cx="0" cy="0" r="55" fill="none" stroke="#2dd4bf" stroke-width="1" opacity="0.15"/>
        
        <!-- d_xy-wave symmetry loops -->
        <path d="M 0 0 C 30 30, 50 10, 40 0 C 30 -10, 10 -30, 0 0" fill="url(#purpleGradient)" fill-opacity="0.25" stroke="#a855f7" stroke-width="1.5"/>
        <path d="M 0 0 C -30 30, -50 10, -40 0 C -30 -10, -10 -30, 0 0" fill="url(#purpleGradient)" fill-opacity="0.25" stroke="#a855f7" stroke-width="1.5"/>
        <path d="M 0 0 C 30 -30, 50 -10, 40 0 C 30 10, 10 30, 0 0" fill="url(#tealGradient)" fill-opacity="0.25" stroke="#2dd4bf" stroke-width="1.5"/>
        <path d="M 0 0 C -30 -30, -50 -10, -40 0 C -30 10, -10 30, 0 0" fill="url(#tealGradient)" fill-opacity="0.25" stroke="#2dd4bf" stroke-width="1.5"/>
        
        <circle cx="0" cy="0" r="8" fill="#ffffff"/>
        <circle cx="-40" cy="0" r="4" fill="#a855f7"/>
        <circle cx="40" cy="0" r="4" fill="#a855f7"/>
        <circle cx="0" cy="-40" r="4" fill="#2dd4bf"/>
        <circle cx="0" cy="40" r="4" fill="#2dd4bf"/>
      </g>

      <g id="brand-text" transform="translate(0, 110)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
        <text font-size="28" font-weight="800" fill="url(#goldText)" letter-spacing="3">C₄zT SYMMETRY</text>
        <text y="34" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="3">ORBITAL LATTICE</text>
        <text y="68" font-size="12" font-weight="600" fill="#718096" letter-spacing="1.5">PSEUDOSPIN SELECTIVE TRANSVERSE RETRIEVAL</text>
      </g>
    </g>

  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/orbital-altermagnetic-photonic-crystal/</text>
  </g>
</svg>
