<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>
    
    <radialGradient id="altermagnetGlow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a1625" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>

    <pattern id="crystalGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="none" stroke="rgba(88, 166, 255, 0.1)" stroke-width="1"/>
      <circle cx="40" cy="40" r="4" fill="rgba(88, 166, 255, 0.3)"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#altermagnetGlow)"/>
  <rect x="0" y="400" width="1920" height="680" fill="url(#crystalGrid)" opacity="0.4"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-130" y="-18" width="260" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-100" cy="-2" r="3" fill="#a78bfa"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">TOPOLOGICAL PHOTONICS</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">ORBITAL ALTERMAGNETIC</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">PHOTONIC CRYSTALS</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">MOMENTUM-DEPENDENT PSEUDOSPIN SPLITTING &amp; D-WAVE SYMMETRY</text>
  </g>

  <!-- Central Physics Visualization: d-wave splitting -->
  <g transform="translate(960, 700)">
    <!-- d_xy wave orbitals -->
    <g opacity="0.6">
      <path d="M 0,0 Q 100,-100 200,0 Q 100,100 0,0" fill="rgba(88, 166, 255, 0.4)" stroke="#58a6ff" stroke-width="2" transform="rotate(45)"/>
      <path d="M 0,0 Q 100,-100 200,0 Q 100,100 0,0" fill="rgba(244, 114, 182, 0.4)" stroke="#f472b6" stroke-width="2" transform="rotate(135)"/>
      <path d="M 0,0 Q 100,-100 200,0 Q 100,100 0,0" fill="rgba(88, 166, 255, 0.4)" stroke="#58a6ff" stroke-width="2" transform="rotate(225)"/>
      <path d="M 0,0 Q 100,-100 200,0 Q 100,100 0,0" fill="rgba(244, 114, 182, 0.4)" stroke="#f472b6" stroke-width="2" transform="rotate(315)"/>
    </g>

    <!-- Splitting Beams -->
    <path d="M -600,0 L -100,0" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="10,10" opacity="0.2"/>
    <path d="M 100,0 L 400,-150" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <path d="M 100,0 L 400,150" stroke="#f472b6" stroke-width="3" marker-end="url(#arrowPink)"/>
    
    <circle r="40" fill="#0a1625" stroke="#ffffff" stroke-width="1.5"/>
    <text y="5" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle">C4zT</text>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/orbital-altermagnetic-photonic-crystal/</text>
  </g>

  <!-- Technical Brackets -->
  <g stroke="var(--accent)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 L 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 L 1870,930"/>
  </g>
</svg>