<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0" />
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="20%" stop-color="#f59e0b"/>
      <stop offset="40%" stop-color="#10b981"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff" fill-opacity="0.15"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>
  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-140" y="-18" width="280" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-110" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">ARXIV BRIEFING</text>
    </g>
    <text font-size="56" font-weight="800" fill="#ffffff" letter-spacing="5">QUANTUM</text>
    <text y="85" font-size="56" font-weight="800" fill="url(#goldText)" letter-spacing="5">PERTURBATIVE PHOTONIC MATRIX MULTIPLICAT</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">Perturbative photonic matrix multiplication: Slashing phase-shift range by 10x</text>
  </g>

  
  <g transform="translate(960, 720)">
    <text x="-540" y="-220" font-family="monospace" font-size="14" fill="#38bdf8" letter-spacing="2">POTENTIAL + ψ</text>

    <!-- axes -->
    <line x1="-480" y1="80" x2="480" y2="80" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.5"/>
    <line x1="-480" y1="80" x2="-480" y2="-140" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="-500" y="-130" font-family="serif" font-style="italic" font-size="22" fill="#ffffff">V</text>
    <text x="490" y="100" font-family="serif" font-style="italic" font-size="22" fill="#ffffff">x</text>

    <!-- V(x) curve filled underneath -->
    <path d="M -460,80 L -300,80 L -200,20 L -100,-80 L -20,20 L 80,80 L 200,80 L 300,40 L 460,80 L 460,80 L -460,80 Z" fill="#38bdf8" fill-opacity="0.18"/>
    <path d="M -460,80 L -300,80 L -200,20 L -100,-80 L -20,20 L 80,80 L 200,80 L 300,40 L 460,80" stroke="#38bdf8" stroke-width="3" fill="none" filter="url(#glow)"/>

    <!-- ψ(x) -->
    <path d="M -440,80 Q -360,80 -340,30 Q -320,-20 -260,-30 Q -200,-30 -180,20 Q -160,60 -100,80 L 60,80 Q 100,80 120,40 Q 140,0 180,-10 Q 240,-10 260,30 Q 280,70 360,80 L 460,80" stroke="#0ea5e9" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
    <text x="-380" y="-50" font-family="serif" font-style="italic" font-size="20" fill="#0ea5e9">ψ(x)</text>

    <!-- barrier label -->
    <text x="-110" y="-100" font-family="monospace" font-size="13" fill="#38bdf8" text-anchor="middle">BARRIER</text>
    <text x="-110" y="-86" font-family="monospace" font-size="11" fill="#38bdf8" text-anchor="middle">ΔV</text>

    <!-- classical turning points -->
    <circle cx="-300" cy="80" r="3" fill="#38bdf8"/>
    <circle cx="200" cy="80" r="3" fill="#38bdf8"/>

    <!-- caption -->
    <text x="0" y="160" font-family="monospace" font-size="14" fill="#38bdf8" text-anchor="middle">V(x) · ψ(x) · CLASSICAL ↔ TUNNELING</text>
  </g>

  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 M 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 M 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/perturbative-photonic-matrix-multiplication/</text>
  </g>
</svg>
