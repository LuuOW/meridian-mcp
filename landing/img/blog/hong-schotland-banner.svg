        <polygon points="0,0 39,23 0,45 -39,23" fill="#1e3d59" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
        <polygon points="39,-22 39,23 0,45 0,0" fill="#17c3b2" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
        <polygon points="-39,-22 -39,23 0,45 0,0" fill="#0a1625" fill-opacity="0.3" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1"/>

        <circle cx="0" cy="0" r="6" fill="#ffffff"/>
        <circle cx="-65" cy="38" r="4" fill="#00f0ff"/>
        <circle cx="65" cy="38" r="4" fill="#ff9f1c"/>
      </g>

      <g id="brand-text" transform="translate(0, 110)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
