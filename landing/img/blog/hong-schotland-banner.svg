    <text y="170" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">BREAKTHROUGH</text>
    <text y="245" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">EXPLORING QUANTUM ENTANGLEMENT &amp; NEW COMMUNICATION FRONTIERS</text>
