        <circle cx="0" cy="0" r="55" fill="none" stroke="#17c3b2" stroke-width="1" opacity="0.15"/>

        <line x1="-110" y1="65" x2="110" y2="-65" stroke="url(#blueLaser)" stroke-width="3.5"/>
        <line x1="-110" y1="-65" x2="110" y2="65" stroke="url(#orangeLaser)" stroke-width="3.5"/>
        
        <polygon points="-85,50 -100,59 -100,43" fill="#00f0ff" opacity="0.8"/>
        <polygon points="85,50 100,59 100,43" fill="#ff9f1c" opacity="0.8"/>

