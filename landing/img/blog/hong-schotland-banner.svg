      <line x1="-130" y1="0" x2="130" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.1" stroke-dasharray="5,5"/>
      <line x1="0" y1="-130" x2="0" y2="-115" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
