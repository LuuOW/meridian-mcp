      <ellipse cx="0" cy="0" rx="120" ry="42" fill="none" stroke="#dfc29e" stroke-width="1.5" stroke-opacity="0.75" transform="rotate(28)"/>
      
      <circle cx="106" cy="-56" r="4" fill="#ffffff"/>
