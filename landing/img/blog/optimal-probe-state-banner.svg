<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff" fill-opacity="0.15"/>
    </pattern>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-130" y="-18" width="260" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-100" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">QUANTUM METROLOGY</text>
    </g>

    <text font-size="54" font-weight="800" fill="#ffffff" letter-spacing="5">OPTIMAL PROBE STATE FOR</text>
    <text y="85" font-size="54" font-weight="800" fill="url(#goldText)" letter-spacing="5">PHASE ESTIMATION</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">COVARIANT MEASUREMENT &amp; TOEPLITZ OPTIMIZATION (arXiv:2606.18169)</text>
  </g>

  <!-- Visualization: Phase Estimation / Toeplitz Grid -->
  <g transform="translate(960, 680)">
    <!-- Phase Circle -->
    <circle cx="0" cy="0" r="250" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="10,10" opacity="0.3"/>
    
    <!-- State Vectors (Fock Coefficients) -->
    <g transform="rotate(-45)">
      <path d="M 0,0 L 250,0" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
      <circle cx="250" cy="0" r="10" fill="#a78bfa"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite"/>
    </g>

    <!-- Toeplitz Matrix Representation Grid -->
    <g transform="translate(-450, -150)" opacity="0.4">
      <rect x="0" y="0" width="180" height="180" fill="none" stroke="#ffffff" stroke-width="1"/>
      <g stroke="#ffffff" stroke-width="0.5">
        <line x1="36" y1="0" x2="36" y2="180"/><line x1="72" y1="0" x2="72" y2="180"/>
        <line x1="108" y1="0" x2="108" y2="180"/><line x1="144" y1="0" x2="144" y2="180"/>
        <line x1="0" y1="36" x2="180" y2="36"/><line x1="0" y1="72" x2="180" y2="72"/>
        <line x1="0" y1="108" x2="180" y2="108"/><line x1="0" y1="144" x2="180" y2="144"/>
      </g>
      <!-- Toeplitz Diagonal Highlights -->
      <path d="M 0,0 L 180,180 M 36,0 L 180,144 M 0,36 L 144,180" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
      <text y="-20" font-family="monospace" font-size="14" fill="#fbbf24">TOEPLITZ MATRIX [T_mn]</text>
    </g>

    <!-- Formula Block -->
    <g transform="translate(0, 200)">
      <rect x="-220" y="-35" width="440" height="70" rx="12" fill="#0f172a" fill-opacity="0.9" stroke="#38bdf8" stroke-opacity="0.4"/>
      <text font-family="'Times New Roman', Times, serif" font-size="28" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
        <tspan font-style="italic">T</tspan><tspan font-style="italic" font-size="22">c</tspan> = <tspan font-style="italic">λ</tspan><tspan font-style="italic" font-size="22">max</tspan><tspan font-style="italic">c</tspan>
      </text>
    </g>

    <text y="320" font-family="monospace" font-size="18" fill="#10b981" text-anchor="middle">ASYMPTOTIC HEISENBERG SCALING ACHIEVED</text>
  </g>

  <!-- Technical Brackets -->
  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 L 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 L 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/optimal-probe-state-phase-estimation/</text>
  </g>
</svg>
