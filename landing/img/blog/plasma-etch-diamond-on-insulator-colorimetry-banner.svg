<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0" />
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="20%" stop-color="#f59e0b"/>
      <stop offset="40%" stop-color="#10b981"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff" fill-opacity="0.15"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>
  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-140" y="-18" width="280" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-110" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">ARXIV BRIEFING</text>
    </g>
    <text font-size="56" font-weight="800" fill="#ffffff" letter-spacing="5">METROLOGY</text>
    <text y="85" font-size="56" font-weight="800" fill="url(#goldText)" letter-spacing="5">PLASMA ETCH PROCESS OPTIMIZATION</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">Plasma Etch Process Optimization for Photonic-Grade Diamond-on-Insulator Substrates and Thickness Ev</text>
  </g>

  
  <g transform="translate(960, 720)">
    <text x="-540" y="-220" font-family="monospace" font-size="14" fill="#38bdf8" letter-spacing="2">SPECTRUM</text>

    <!-- spectrum bar with rainbow gradient -->
    <rect x="-460" y="-30" width="920" height="60" rx="8" fill="url(#spectrumGrad)" opacity="0.9"/>
    <rect x="-460" y="-30" width="920" height="60" rx="8" fill="none" stroke="#38bdf8" stroke-opacity="0.4"/>

    <!-- wavelength axis with tick marks -->
    <line x1="-460" y1="50" x2="460" y2="50" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.5"/>
    
      <line x1="-400" y1="50" x2="-400" y2="58" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.2"/>
      <text x="-400" y="74" font-family="monospace" font-size="11" fill="#a0afb7" text-anchor="middle">-2Δ</text>
    
      <line x1="-200" y1="50" x2="-200" y2="58" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.2"/>
      <text x="-200" y="74" font-family="monospace" font-size="11" fill="#a0afb7" text-anchor="middle">-1Δ</text>
    
      <line x1="0" y1="50" x2="0" y2="58" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.2"/>
      <text x="0" y="74" font-family="monospace" font-size="11" fill="#a0afb7" text-anchor="middle">λ₀</text>
    
      <line x1="200" y1="50" x2="200" y2="58" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.2"/>
      <text x="200" y="74" font-family="monospace" font-size="11" fill="#a0afb7" text-anchor="middle">+1Δ</text>
    
      <line x1="400" y1="50" x2="400" y2="58" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.2"/>
      <text x="400" y="74" font-family="monospace" font-size="11" fill="#a0afb7" text-anchor="middle">+2Δ</text>
    

    <!-- central peak (the emission line) -->
    <g filter="url(#glow)">
      <rect x="-30" y="-50" width="60" height="120" fill="#0ea5e9" opacity="0.85"/>
    </g>
    <circle cx="0" cy="0" r="22" fill="#0ea5e9">
      <animate attributeName="r" values="22;28;22" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- secondary peaks -->
    <g opacity="0.7">
      <rect x="-280" y="-20" width="14" height="50" fill="#38bdf8"/>
      <rect x="240" y="-30" width="22" height="60" fill="#38bdf8"/>
    </g>

    <!-- baseline label -->
    <text x="-460" y="-50" font-family="monospace" font-size="13" fill="#a0afb7">INTENSITY (a.u.)</text>
    <text x="460" y="-50" font-family="monospace" font-size="13" fill="#a0afb7" text-anchor="end">λ (nm)</text>

    <!-- caption -->
    <text x="0" y="160" font-family="monospace" font-size="14" fill="#38bdf8" text-anchor="middle">PRIMARY EMISSION @ λ₀ · FWHM Δλ</text>
  </g>

  <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 M 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 M 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/plasma-etch-diamond-on-insulator-colorimetry/</text>
  </g>
</svg>
