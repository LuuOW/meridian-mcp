      <stop offset="0%" stop-color="#10203b"/>
      <stop offset="55%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#03060b"/>
    </radialGradient>
    <linearGradient id="plasma" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="0%" y2="100%">
