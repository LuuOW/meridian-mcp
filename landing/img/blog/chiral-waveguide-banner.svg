<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <linearGradient id="chiralFlow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="antiChiralFlow" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#f472b6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>

  <!-- Background Technical Grid -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <path d="M 0,200 L 1920,200 M 0,400 L 1920,400 M 0,600 L 1920,600 M 0,800 L 1920,800"/>
    <path d="M 200,0 L 200,1080 M 400,0 L 400,1080 M 600,0 L 600,1080 M 800,0 L 800,1080 M 1000,0 L 1000,1080 M 1200,0 L 1200,1080 M 1400,0 L 1400,1080 M 1600,0 L 1600,1080"/>
  </g>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-110" y="-18" width="220" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-80" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">QUANTUM NETWORKS</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">CHIRAL &amp; ANTICHIRAL</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">WAVEGUIDE ARRAYS</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">NON-RECIPROCAL TRANSPORT &amp; DIRAC FIELD MAPPING</text>
  </g>

  <!-- Chiral Visualization (Left) -->
  <g transform="translate(480, 700)">
    <text y="-200" font-family="monospace" font-size="18" fill="#38bdf8" text-anchor="middle">CHIRAL (1+1)D DIRAC</text>
    <g opacity="0.8">
      <path d="M -200,-100 L 200,-100" stroke="url(#chiralFlow)" stroke-width="4" marker-end="url(#arrowBlue)"/>
      <path d="M -200,-50 L 200,-50" stroke="url(#chiralFlow)" stroke-width="4" marker-end="url(#arrowBlue)"/>
      <path d="M -200,0 L 200,0" stroke="url(#chiralFlow)" stroke-width="4" marker-end="url(#arrowBlue)"/>
      <path d="M -200,50 L 200,50" stroke="url(#chiralFlow)" stroke-width="4" marker-end="url(#arrowBlue)"/>
      <path d="M -200,100 L 200,100" stroke="url(#chiralFlow)" stroke-width="4" marker-end="url(#arrowBlue)"/>
    </g>
    <!-- Light Cone -->
    <path d="M 0,0 L 150,-100 L 150,100 Z" fill="rgba(56, 189, 248, 0.15)" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5,5"/>
    <text x="80" y="20" font-family="monospace" font-size="12" fill="#ffffff" opacity="0.6">LIGHT CONE</text>
  </g>

  <!-- Anti-Chiral Visualization (Right) -->
  <g transform="translate(1440, 700)">
    <text y="-200" font-family="monospace" font-size="18" fill="#f472b6" text-anchor="middle">ANTICHIRAL (2+0)D DIRAC</text>
    <g opacity="0.8">
      <path d="M -200,-100 L 200,-100" stroke="url(#chiralFlow)" stroke-width="4"/>
      <path d="M 200,-50 L -200,-50" stroke="url(#antiChiralFlow)" stroke-width="4"/>
      <path d="M -200,0 L 200,0" stroke="url(#chiralFlow)" stroke-width="4"/>
      <path d="M 200,50 L -200,50" stroke="url(#antiChiralFlow)" stroke-width="4"/>
      <path d="M -200,100 L 200,100" stroke="url(#chiralFlow)" stroke-width="4"/>
    </g>
    <!-- Reciprocal Scattering -->
    <circle r="80" fill="none" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="10,10"/>
    <text y="5" font-family="monospace" font-size="12" fill="#ffffff" opacity="0.6" text-anchor="middle">RECIPROCAL</text>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/chiral-waveguide-arrays/</text>
  </g>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8" />
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f472b6" />
    </marker>
  </defs>
</svg>