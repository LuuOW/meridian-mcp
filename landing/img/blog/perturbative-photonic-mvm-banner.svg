<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1625" />
      <stop offset="60%" stop-color="#050c16" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>

    <linearGradient id="phaseFlow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="60%" stop-color="#dfc29e" />
      <stop offset="100%" stop-color="#b89773" />
    </linearGradient>
    
    <pattern id="dotPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(88, 166, 255, 0.15)"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>

  <rect x="30" y="30" width="1860" height="1020" rx="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(960, 220)" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <g transform="translate(0, -90)">
      <rect x="-130" y="-18" width="260" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      <circle cx="-100" cy="-2" r="3" fill="#38bdf8"/>
      <text y="4" font-size="13" font-weight="bold" fill="#a0afb7" letter-spacing="4">PHOTONIC COMPUTING</text>
    </g>

    <text font-size="64" font-weight="800" fill="#ffffff" letter-spacing="5">PERTURBATIVE PHOTONIC</text>
    <text y="85" font-size="64" font-weight="800" fill="url(#goldText)" letter-spacing="5">MATRIX MULTIPLICATION</text>
    <text y="170" font-size="20" font-weight="500" fill="#a0afb7" letter-spacing="3" opacity="0.8">OPTIMIZING PHASE-SHIFT RANGE FOR SCALABLE AI INFRASTRUCTURE</text>
  </g>

  <!-- MZI Mesh Visualization -->
  <g transform="translate(960, 680)">
    <!-- Main Mesh Grid -->
    <g stroke="rgba(88, 166, 255, 0.2)" stroke-width="2" fill="none">
      <path d="M -500,-100 L 500,-100 M -500,100 L 500,100"/>
      <!-- Waveguide Intersections (MZIs) -->
      <g transform="translate(-300, 0)">
        <rect x="-40" y="-110" width="80" height="220" rx="8" fill="rgba(15, 23, 42, 0.6)" stroke="#38bdf8" stroke-width="1.5"/>
        <text y="140" font-family="monospace" font-size="10" fill="#38bdf8" text-anchor="middle">MZI_ALPHA</text>
      </g>
      <g transform="translate(0, 0)">
        <rect x="-40" y="-110" width="80" height="220" rx="8" fill="rgba(15, 23, 42, 0.6)" stroke="#38bdf8" stroke-width="1.5"/>
        <text y="140" font-family="monospace" font-size="10" fill="#38bdf8" text-anchor="middle">MZI_BETA</text>
      </g>
      <g transform="translate(300, 0)">
        <rect x="-40" y="-110" width="80" height="220" rx="8" fill="rgba(15, 23, 42, 0.6)" stroke="#38bdf8" stroke-width="1.5"/>
        <text y="140" font-family="monospace" font-size="10" fill="#38bdf8" text-anchor="middle">MZI_GAMMA</text>
      </g>
    </g>
    
    <!-- Perturbation Signal -->
    <path d="M -600,-100 Q -400,-120 -300,-100 T 0,-100 T 300,-100 T 600,-100" fill="none" stroke="url(#phaseFlow)" stroke-width="3"/>
    <circle cx="-300" cy="-100" r="5" fill="#ffffff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" infinite="true"/>
    </circle>
    
    <text y="-180" font-family="monospace" font-size="16" fill="#a78bfa" text-anchor="middle">REDUCED PHASE RANGE: Δφ &lt; π/10</text>
  </g>

  <!-- Technical Brackets -->
  <g stroke="var(--accent)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 50,50 L 150,50 M 50,50 L 50,150"/>
    <path d="M 1870,50 L 1770,50 M 1870,50 L 1870,150"/>
    <path d="M 50,1030 L 150,1030 M 50,1030 L 50,930"/>
    <path d="M 1870,1030 L 1770,1030 M 1870,1030 L 1870,930"/>
  </g>

  <g transform="translate(960, 1010)" text-anchor="middle" font-family="sans-serif">
    <text font-size="15" font-weight="bold" fill="#ffffff" fill-opacity="0.4" letter-spacing="4">— ASK-MERIDIAN.UK —</text>
    <text y="24" font-size="13" fill="#718096" fill-opacity="0.8" letter-spacing="1">/blog/perturbative-photonic-matrix-multiplication/</text>
  </g>
</svg>