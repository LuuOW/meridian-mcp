      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="700" letter-spacing="1" fill="#D4A574">B1</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#D4A574" fill-opacity="0.7">Ch 3.1</text>
      <!-- Five-pointed star -->
      <path d="M 77.5 70 L 84.7 87.6 L 103 89.4 L 89 102.4 L 93.4 121 L 77.5 110.6 L 61.6 121 L 66 102.4 L 52 89.4 L 70.3 87.6 Z"
            fill="#D4A574"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" font-weight="700" letter-spacing="1.5" fill="#D4A574">SHIPPED</text>
    </g>

    <!-- B2: parked (◐) -->
    <g transform="translate(340, 240)">
      <rect x="0" y="0" width="155" height="170" rx="6" fill="#0A1628" fill-opacity="0.4" stroke="#1A2D4A" stroke-width="1"/>
      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="600" letter-spacing="1" fill="#B8893F">B2</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#5A6A82">Ch 6.4</text>
      <!-- Half-filled circle (parked symbol) -->
      <circle cx="77.5" cy="90" r="20" fill="none" stroke="#B8893F" stroke-width="2.5"/>
      <path d="M 77.5 70 A 20 20 0 0 1 77.5 110 Z" fill="#B8893F"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" letter-spacing="1.5" fill="#B8893F">parked</text>
    </g>

    <!-- B3: blocked (○) -->
    <g transform="translate(510, 240)">
      <rect x="0" y="0" width="155" height="170" rx="6" fill="#0A1628" fill-opacity="0.4" stroke="#1A2D4A" stroke-width="1"/>
      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="600" letter-spacing="1" fill="#5A6A82">B3</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#5A6A82">infra</text>
      <circle cx="77.5" cy="90" r="20" fill="none" stroke="#5A6A82" stroke-width="2.5"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" letter-spacing="1.5" fill="#5A6A82">blocked</text>
    </g>

    <!-- B4: skipped (○) -->
    <g transform="translate(680, 240)">
      <rect x="0" y="0" width="155" height="170" rx="6" fill="#0A1628" fill-opacity="0.4" stroke="#1A2D4A" stroke-width="1"/>
      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="600" letter-spacing="1" fill="#5A6A82">B4</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#5A6A82">Ch 6.8</text>
      <circle cx="77.5" cy="90" r="20" fill="none" stroke="#5A6A82" stroke-width="2.5"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" letter-spacing="1.5" fill="#5A6A82">skipped</text>
    </g>

    <!-- Legend -->
    <g transform="translate(0, 440)">
      <circle cx="8" cy="0" r="6" fill="#A8B5C7"/>
      <text x="22" y="5" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1.5" fill="#A8B5C7">positive (2)</text>
      <circle cx="166" cy="0" r="6" fill="none" stroke="#5A6A82" stroke-width="1.6"/>
      <text x="180" y="5" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5A6A82">negative (6)</text>
      <path d="M 320 -6 A 6 6 0 0 1 320 6 Z" fill="#B8893F"/>
      <circle cx="320" cy="0" r="6" fill="none" stroke="#B8893F" stroke-width="1.6"/>
      <text x="334" y="5" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1.5" fill="#B8893F">parked (1)</text>
      <path d="M 478 -6 L 480.5 -1 L 486 -0.5 L 482 3 L 483 8.5 L 478 6 L 473 8.5 L 474 3 L 470 -0.5 L 475.5 -1 Z" fill="#D4A574"/>
      <text x="492" y="5" font-family="'SF Mono', monospace" font-size="11" font-weight="700" letter-spacing="1.5" fill="#D4A574">SHIPPED (1)</text>
    </g>
