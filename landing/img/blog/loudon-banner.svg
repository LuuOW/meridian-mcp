  <!-- ===== BOTTOM: MERIDIAN MARK + URL + FORMULA STAMP ===== -->
  <!-- Mini Meridian orbital mark + label -->
  <g transform="translate(160, 985)">
    <ellipse rx="48" ry="14" fill="none" stroke="#F5F1E8" stroke-width="1.4" transform="rotate(-22)"/>
    <ellipse rx="48" ry="14" fill="none" stroke="#D4A574" stroke-width="1.2" transform="rotate(22)" stroke-opacity="0.9"/>
    <circle r="5" fill="#F5F1E8"/>
    <circle r="1.5" fill="#070D1A"/>
    <text x="78" y="6"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="20" font-weight="400"
          letter-spacing="0.5"
          fill="#F5F1E8">Meridian</text>
  </g>

  <!-- Formula stamp (centered) — the τc definition from the post -->
  <text x="960" y="990" text-anchor="middle"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="22" font-style="italic"
        letter-spacing="2"
        fill="#5A6A82">τc  =  Σ  |g⁽¹⁾(τ)|²</text>

  <!-- URL stamp (right) -->
  <g transform="translate(1800, 985)">
    <text x="0" y="-2" text-anchor="end"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="14" font-weight="400"
          letter-spacing="2"
          fill="#5A6A82">/blog/loudon-photon-route-coherence-time</text>
    <text x="0" y="22" text-anchor="end"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="17" font-weight="500"
          letter-spacing="3"
          fill="#D4A574">ASK-MERIDIAN.UK</text>
  </g>
</svg>
