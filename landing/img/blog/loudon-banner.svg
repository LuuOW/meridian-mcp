      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="600" letter-spacing="1" fill="#5A6A82">sq.abl</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#5A6A82">Ch 5.4</text>
      <circle cx="77.5" cy="90" r="20" fill="none" stroke="#5A6A82" stroke-width="2.5"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" letter-spacing="1.5" fill="#5A6A82">decorative</text>
    </g>

    <!-- B1: SHIPPED (★ in gold) — THE HERO CELL -->
    <g transform="translate(170, 240)">
      <!-- Gold glow behind cell -->
      <rect x="-8" y="-8" width="171" height="186" rx="10" fill="url(#shipGlow)"/>
      <!-- Cell with gold border -->
