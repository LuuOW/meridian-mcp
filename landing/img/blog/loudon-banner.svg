<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070D1A"/>
      <stop offset="55%" stop-color="#0F1F38"/>
      <stop offset="100%" stop-color="#070D1A"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A3358" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1A3358" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="winGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <ellipse cx="960" cy="540" rx="900" ry="500" fill="url(#centerGlow)"/>

  <!-- Starfield -->
  <g fill="#F5F1E8">
    <circle cx="120" cy="80" r="1.4" fill-opacity="0.5"/>
    <circle cx="280" cy="155" r="1.0" fill-opacity="0.35"/>
    <circle cx="450" cy="60" r="1.2" fill-opacity="0.5"/>
    <circle cx="610" cy="120" r="0.9" fill-opacity="0.3"/>
    <circle cx="790" cy="75" r="1.5" fill-opacity="0.55"/>
    <circle cx="1180" cy="55" r="1.1" fill-opacity="0.4"/>
    <circle cx="1340" cy="95" r="1.6" fill-opacity="0.6"/>
    <circle cx="1700" cy="65" r="1.0" fill-opacity="0.35"/>
    <circle cx="1850" cy="140" r="1.1" fill-opacity="0.4"/>
    <circle cx="80" cy="320" r="1.0" fill-opacity="0.4"/>
    <circle cx="60" cy="720" r="1.0" fill-opacity="0.35"/>
    <circle cx="1880" cy="600" r="1.3" fill-opacity="0.5"/>
    <circle cx="280" cy="950" r="1.2" fill-opacity="0.45"/>
    <circle cx="500" cy="990" r="0.9" fill-opacity="0.3"/>
    <circle cx="1100" cy="1015" r="1.0" fill-opacity="0.4"/>
    <circle cx="1640" cy="1020" r="0.9" fill-opacity="0.35"/>
  </g>

  <!-- ===== TOP TAG: READ-AND-SHIP ===== -->
  <g transform="translate(140, 130)">
    <rect x="0" y="-22" width="240" height="44" rx="22"
          fill="#D4A574" fill-opacity="0.10"
          stroke="#D4A574" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="32" cy="0" r="4" fill="#D4A574"/>
    <text x="48" y="6" text-anchor="start"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="15" font-weight="600"
          letter-spacing="4"
          fill="#D4A574">READ-AND-SHIP</text>
  </g>

  <!-- ===== HEADLINE ===== -->
  <text x="140" y="285"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="80" font-weight="300"
        letter-spacing="-1.5"
        fill="#F5F1E8">Nine experiments.</text>
  <text x="140" y="385"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="80" font-weight="300" font-style="italic"
        letter-spacing="-1.5"
        fill="#D4A574">One ship.</text>

  <!-- Rule + Subhead -->
  <line x1="140" y1="435" x2="200" y2="435" stroke="#D4A574" stroke-width="1.4"/>
  <text x="140" y="478"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="22" font-weight="300"
        letter-spacing="0.3"
        fill="#A8B5C7">Mining Loudon's <tspan font-style="italic">Quantum Theory of Light</tspan> for a router.</text>
  <text x="140" y="510"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="22" font-weight="300"
        letter-spacing="0.3"
        fill="#A8B5C7">Honest accounting.</text>

  <!-- ===== LESSON CALLOUT (left, with +108% hero) ===== -->
  <g transform="translate(140, 580)">
    <rect x="0" y="0" width="700" height="290" rx="6" fill="#0A1628" fill-opacity="0.5" stroke="#1A2D4A" stroke-width="1"/>
    <ellipse cx="180" cy="160" rx="220" ry="120" fill="url(#winGlow)"/>

    <text x="28" y="42"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="13" font-weight="600"
          letter-spacing="3.5"
          fill="#5A6A82">THE  WIN</text>

    <!-- Big +108% -->
    <text x="28" y="160"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="110" font-weight="500"
          letter-spacing="-3"
          fill="#D4A574">+108%</text>

    <text x="28" y="200"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="22" font-weight="300"
          fill="#F5F1E8">discrimination lift · τ<tspan baseline-shift="-30%" font-size="16">c</tspan> vs cross_domain</text>

    <!-- Bottom row: tech proof points -->
    <line x1="28" y1="225" x2="672" y2="225" stroke="#1A2D4A" stroke-width="1"/>
    <text x="28" y="258"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="14" font-weight="400"
          letter-spacing="0.5"
          fill="#A8B5C7">10 lines of JS  ·  CV 0.99 → 2.06  ·  meridian-orbital@3.1.0</text>
  </g>

  <!-- ===== RIGHT: 10-CELL EXPERIMENT GRID ===== -->
  <g transform="translate(940, 200)">
    <!-- Section header -->
    <text x="0" y="0"
          font-family="'SF Mono', 'Menlo', 'Courier New', monospace"
          font-size="13" font-weight="600"
          letter-spacing="4"
          fill="#5A6A82">10  EXPERIMENTS  ·  LOUDON-GROUNDED</text>
    <line x1="0" y1="20" x2="820" y2="20" stroke="#1A2D4A" stroke-width="1"/>

    <!-- ROW 1: A1, A2, A3-S, A3-R, A4 -->

    <!-- A1: positive baseline (●) -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="155" height="170" rx="6" fill="#0A1628" fill-opacity="0.4" stroke="#1A2D4A" stroke-width="1"/>
      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="600" letter-spacing="1" fill="#A8B5C7">A1</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#5A6A82">Ch 5.3</text>
      <circle cx="77.5" cy="90" r="20" fill="#A8B5C7"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" letter-spacing="1.5" fill="#A8B5C7">trained</text>
    </g>

    <!-- A2: negative (○) -->
    <g transform="translate(170, 50)">
      <rect x="0" y="0" width="155" height="170" rx="6" fill="#0A1628" fill-opacity="0.4" stroke="#1A2D4A" stroke-width="1"/>
      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="600" letter-spacing="1" fill="#5A6A82">A2</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#5A6A82">Ch 6.4</text>
      <circle cx="77.5" cy="90" r="20" fill="none" stroke="#5A6A82" stroke-width="2.5"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" letter-spacing="1.5" fill="#5A6A82">subsumed</text>
    </g>

    <!-- A3-Simple: negative (○) -->
    <g transform="translate(340, 50)">
      <rect x="0" y="0" width="155" height="170" rx="6" fill="#0A1628" fill-opacity="0.4" stroke="#1A2D4A" stroke-width="1"/>
      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="600" letter-spacing="1" fill="#5A6A82">A3-S</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#5A6A82">Ch 6.10</text>
      <circle cx="77.5" cy="90" r="20" fill="none" stroke="#5A6A82" stroke-width="2.5"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" letter-spacing="1.5" fill="#5A6A82">marginal</text>
    </g>

    <!-- A3-Real: negative (○) -->
    <g transform="translate(510, 50)">
      <rect x="0" y="0" width="155" height="170" rx="6" fill="#0A1628" fill-opacity="0.4" stroke="#1A2D4A" stroke-width="1"/>
      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="600" letter-spacing="1" fill="#5A6A82">A3-R</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#5A6A82">Ch 9.4</text>
      <circle cx="77.5" cy="90" r="20" fill="none" stroke="#5A6A82" stroke-width="2.5"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" letter-spacing="1.5" fill="#5A6A82">no lift</text>
    </g>

    <!-- A4: positive baseline (●) -->
    <g transform="translate(680, 50)">
      <rect x="0" y="0" width="155" height="170" rx="6" fill="#0A1628" fill-opacity="0.4" stroke="#1A2D4A" stroke-width="1"/>
      <text x="14" y="28" font-family="'SF Mono', monospace" font-size="13" font-weight="600" letter-spacing="1" fill="#A8B5C7">A4</text>
      <text x="141" y="28" text-anchor="end" font-family="'SF Mono', monospace" font-size="11" letter-spacing="1" fill="#5A6A82">infra</text>
      <circle cx="77.5" cy="90" r="20" fill="#A8B5C7"/>
      <text x="77.5" y="148" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" letter-spacing="1.5" fill="#A8B5C7">eval set</text>
